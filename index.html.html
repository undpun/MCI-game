<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MCI Command — Mass Casualty Incident Simulation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
<style>
:root{
  --bg:#0B0F14;
  --bg-panel:#121821;
  --bg-panel-2:#1A222D;
  --line:#26313F;
  --line-soft:#1D2732;
  --ink:#E7EDF3;
  --ink-dim:#8FA1B3;
  --ink-faint:#5E6E7E;
  --accent:#2FD3C7;
  --accent-dim:#1B7A73;
  --red:#E5484D;
  --red-dim:#3A1719;
  --yellow:#F3A712;
  --yellow-dim:#3A2C0C;
  --green:#3FBF6F;
  --green-dim:#12301E;
  --black-tri:#9BA3AE;
  --black-dim:#22262B;
  --font-display:'Space Grotesk', sans-serif;
  --font-body:'IBM Plex Sans Thai','IBM Plex Sans',sans-serif;
  --font-mono:'IBM Plex Mono', monospace;
  --radius:10px;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:
    radial-gradient(ellipse 900px 500px at 15% -10%, rgba(47,211,199,.07), transparent 60%),
    radial-gradient(ellipse 700px 500px at 100% 0%, rgba(229,72,77,.05), transparent 55%),
    var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--accent-dim);color:#fff;}
button{font-family:inherit;}
input,select,textarea{font-family:inherit;}

/* ---------- scaffold ---------- */
#app{min-height:100vh;display:flex;flex-direction:column;}

.topbar{
  display:flex;align-items:center;gap:14px;
  padding:10px 18px;
  background:linear-gradient(180deg, var(--bg-panel), rgba(18,24,33,.85));
  border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:40;
  backdrop-filter:blur(6px);
}
.brand{
  font-family:var(--font-display);
  font-weight:700;
  font-size:15px;
  letter-spacing:.02em;
  color:var(--ink);
  display:flex;align-items:center;gap:8px;
  white-space:nowrap;
}
.brand .dot{
  width:9px;height:9px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 0 3px rgba(47,211,199,.15);
}
.clockwrap{
  display:flex;align-items:center;gap:10px;
  font-family:var(--font-mono);
  margin-left:auto;
  flex-wrap:wrap;
  justify-content:flex-end;
}
.pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 10px;border-radius:999px;
  border:1px solid var(--line);
  background:var(--bg-panel-2);
  font-size:12px;color:var(--ink-dim);
  white-space:nowrap;
}
.pill b{color:var(--ink);font-weight:600;}
.pill.status-RUNNING{border-color:var(--accent-dim);color:var(--accent);}
.pill.status-ENDED{border-color:#4a2b2b;color:var(--red);}
.pill.status-NOT_STARTED{border-color:var(--line);color:var(--ink-faint);}
.timerbig{
  font-family:var(--font-mono);
  font-size:22px;font-weight:600;
  color:var(--ink);
  letter-spacing:.03em;
  padding:2px 4px;
  position:relative;
}
.sweepbar{
  height:2px;width:100%;
  background:linear-gradient(90deg, transparent, var(--accent), transparent);
  background-size:200% 100%;
  animation:sweep 2.6s linear infinite;
  opacity:.7;
}
@keyframes sweep{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

.mebadge{
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--ink-dim);
}
.mebadge b{color:var(--ink);}
.switchbtn{
  background:none;border:1px solid var(--line);color:var(--ink-dim);
  border-radius:7px;padding:4px 9px;font-size:11px;cursor:pointer;
}
.switchbtn:hover{border-color:var(--accent-dim);color:var(--accent);}

.main{
  flex:1;
  width:100%;
  max-width:1360px;
  margin:0 auto;
  padding:20px 18px 60px;
}

/* ---------- generic components ---------- */
.card{
  background:var(--bg-panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px;
}
.card + .card{margin-top:14px;}
.grid{display:grid;gap:14px;}
.grid.cols-2{grid-template-columns:repeat(2,1fr);}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
@media (max-width:900px){
  .grid.cols-2,.grid.cols-3,.grid.cols-4{grid-template-columns:1fr;}
}

h1,h2,h3,h4{font-family:var(--font-display);margin:0 0 10px;color:var(--ink);}
h1{font-size:26px;font-weight:700;}
h2{font-size:18px;font-weight:600;}
h3{font-size:14px;font-weight:600;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.06em;}
p{color:var(--ink-dim);line-height:1.55;margin:0 0 10px;}

.label{font-size:12px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;display:block;}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  background:var(--bg-panel-2);
  border:1px solid var(--line);
  color:var(--ink);
  padding:9px 16px;
  border-radius:8px;
  font-size:13px;font-weight:600;
  cursor:pointer;
  transition:border-color .15s, background .15s, transform .05s;
}
.btn:hover{border-color:var(--accent-dim);}
.btn:active{transform:scale(.97);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#04211E;}
.btn.primary:hover{background:#3EE6D9;}
.btn.danger{background:var(--red);border-color:var(--red);color:#2B0708;}
.btn.danger:hover{background:#ff5b60;}
.btn.ghost{background:transparent;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn.block{width:100%;}
.btn.sm{padding:6px 10px;font-size:12px;border-radius:6px;}

input[type=text],input[type=number],select,textarea{
  width:100%;
  background:var(--bg);
  border:1px solid var(--line);
  color:var(--ink);
  padding:9px 11px;
  border-radius:7px;
  font-size:13.5px;
  outline:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(47,211,199,.12);}
select{cursor:pointer;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{
  text-align:left;font-size:11px;color:var(--ink-faint);
  text-transform:uppercase;letter-spacing:.05em;font-weight:600;
  padding:8px 10px;border-bottom:1px solid var(--line);
  white-space:nowrap;
}
td{padding:9px 10px;border-bottom:1px solid var(--line-soft);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr.row-hover:hover td{background:rgba(255,255,255,.02);}

.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:999px;
  font-size:11px;font-weight:600;letter-spacing:.02em;
  border:1px solid transparent;
  white-space:nowrap;
}
.badge.RED{background:var(--red-dim);color:var(--red);border-color:#5a2427;}
.badge.YELLOW{background:var(--yellow-dim);color:var(--yellow);border-color:#5a4413;}
.badge.GREEN{background:var(--green-dim);color:var(--green);border-color:#1f5c39;}
.badge.BLACK{background:var(--black-dim);color:var(--black-tri);border-color:#3a3f46;}
.badge.ok{background:var(--green-dim);color:var(--green);}
.badge.bad{background:var(--red-dim);color:var(--red);}
.badge.wait{background:var(--yellow-dim);color:var(--yellow);}
.badge.neutral{background:var(--bg-panel-2);color:var(--ink-dim);border-color:var(--line);}
.badge.dead{background:#000;color:var(--red);border-color:var(--red);}

.pulse-dot{
  width:7px;height:7px;border-radius:50%;background:var(--yellow);
  animation:pulse 1.2s ease-in-out infinite;display:inline-block;
}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(243,167,18,.5);}50%{opacity:.5;box-shadow:0 0 0 4px rgba(243,167,18,0);}}

.stripe-RED{border-left:3px solid var(--red);}
.stripe-YELLOW{border-left:3px solid var(--yellow);}
.stripe-GREEN{border-left:3px solid var(--green);}
.stripe-BLACK{border-left:3px solid var(--black-tri);}

.patient-card{
  background:var(--bg-panel-2);
  border:1px solid var(--line);
  border-radius:9px;
  padding:13px 14px;
  margin-bottom:10px;
}
.patient-card .pidrow{
  display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;
}
.pid{font-family:var(--font-mono);font-size:17px;font-weight:600;color:var(--ink);}
.subrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px;}

.empty{
  text-align:center;padding:40px 20px;color:var(--ink-faint);
  border:1px dashed var(--line);border-radius:10px;
}
.empty .big{font-size:32px;margin-bottom:8px;}

.toastwrap{
  position:fixed;bottom:18px;right:18px;z-index:100;
  display:flex;flex-direction:column;gap:8px;
  max-width:360px;
}
.toast{
  background:var(--bg-panel-2);border:1px solid var(--line);
  border-left:3px solid var(--accent);
  padding:10px 14px;border-radius:8px;font-size:13px;color:var(--ink);
  box-shadow:0 8px 24px rgba(0,0,0,.35);
  animation:toastin .2s ease;
}
.toast.err{border-left-color:var(--red);}
.toast.ok{border-left-color:var(--green);}
@keyframes toastin{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.tab{
  padding:8px 14px;border-radius:8px;border:1px solid var(--line);
  background:var(--bg-panel);color:var(--ink-dim);font-size:13px;font-weight:600;
  cursor:pointer;
}
.tab.active{background:var(--accent);color:#04211E;border-color:var(--accent);}

.station-hero{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;flex-wrap:wrap;gap:10px;
}
.station-hero .titlewrap .eyebrow{
  font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;
}
.capbar{
  display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:12px;color:var(--ink-dim);
}
.capbar .capfill{width:70px;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;border:1px solid var(--line);}
.capbar .capfill i{display:block;height:100%;background:var(--accent);}

/* join screen */
.joinwrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.joincard{
  width:100%;max-width:420px;
  background:var(--bg-panel);border:1px solid var(--line);border-radius:14px;
  padding:32px 28px;
  position:relative;
  overflow:hidden;
}
.joincard::before{
  content:'';position:absolute;top:-40%;left:-20%;width:180%;height:180%;
  background:radial-gradient(circle at 30% 20%, rgba(47,211,199,.08), transparent 55%);
  pointer-events:none;
}
.jc-title{font-family:var(--font-display);font-size:22px;font-weight:700;margin-bottom:4px;}
.jc-sub{color:var(--ink-faint);font-size:13px;margin-bottom:22px;}

.waitwrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;
  padding:20px;text-align:center;
}
.spinner{
  width:36px;height:36px;border-radius:50%;
  border:3px solid var(--line);border-top-color:var(--accent);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.kv{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line-soft);font-size:13px;}
.kv:last-child{border-bottom:none;}
.kv .k{color:var(--ink-faint);}
.kv .v{color:var(--ink);font-family:var(--font-mono);font-weight:600;}

.roster-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-soft);flex-wrap:wrap;}
.roster-row:last-child{border-bottom:none;}
.roster-name{font-weight:600;min-width:120px;}
.dotlive{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
.dotstale{width:7px;height:7px;border-radius:50%;background:var(--ink-faint);flex-shrink:0;}

.hint{font-size:12px;color:var(--ink-faint);margin-top:4px;}
.section-gap{margin-top:24px;}
.flexrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.flex1{flex:1;min-width:120px;}

/* ===================== Scene Setup (embedded map module) ===================== */
:root{
  --sc-panel-2:#232833; --sc-line:#2d333f; --sc-amber:#f0a020; --sc-amber-dim:#c98419;
}
#scRoot{display:flex;flex-direction:column;height:88vh;min-height:650px;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#0d0f13;}
#scRoot .sc-toolbar{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 12px;background:var(--bg-panel-2);border-bottom:1px solid var(--line);flex-wrap:wrap;}
#scRoot .sc-body{flex:1;display:flex;min-height:0;position:relative;}
#scRoot .sc-sidebar{width:220px;flex-shrink:0;background:var(--bg-panel-2);border-right:1px solid var(--line);overflow-y:auto;}
#scRoot .sc-map{flex:1;min-width:0;background:#0d0f13;}
#scRoot .sc-footer{padding:6px 12px;background:var(--bg-panel-2);border-top:1px solid var(--line);font-size:11px;color:var(--ink-faint);display:flex;justify-content:space-between;}
.sc-sect{padding:10px 12px;border-bottom:1px solid var(--sc-line);}
.sc-sect h2{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-faint);margin:0 0 8px 0;font-weight:700;}
.sc-tool-grid{display:flex;flex-direction:column;gap:5px;}
.sc-tool{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;background:var(--sc-panel-2);border:1px solid transparent;cursor:pointer;font-size:12px;}
.sc-tool:hover{border-color:var(--sc-line);}
.sc-tool.active{border-color:var(--sc-amber);background:#2a2210;}
.sc-tool .sc-ic{width:20px;text-align:center;flex-shrink:0;}
.sc-tool .sc-ic svg{display:block;}
.sc-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;padding:5px 6px;background:var(--sc-panel-2);border-radius:5px;cursor:pointer;margin-bottom:4px;}
.sc-legend-item:hover{background:#2a3040;}
.sc-legend-item .sc-lname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sc-legend-item .sc-ldel{color:var(--ink-faint);cursor:pointer;padding:0 3px;}
.sc-empty-note{font-size:10.5px;color:var(--ink-faint);font-style:italic;padding:4px 2px;}
.sc-tent-icon{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #0d0f13;box-shadow:0 2px 6px rgba(0,0,0,.5);}
.sc-tent-icon span{transform:rotate(45deg);font-size:14px;}
.leaflet-popup-content-wrapper{background:var(--sc-panel-2);color:var(--ink);border-radius:8px;}
.leaflet-popup-tip{background:var(--sc-panel-2);}
.sc-popup input,.sc-popup select{width:100%;background:#1b1f26;border:1px solid var(--sc-line);color:var(--ink);border-radius:5px;padding:6px 7px;font-size:12px;margin-bottom:6px;font-family:inherit;}
.sc-popup .sc-row{display:flex;gap:6px;}
.sc-popup button{flex:1;font-size:11px;padding:6px;}
.sc-route-label{background:var(--sc-panel-2);color:var(--sc-amber);border:1px solid var(--sc-amber-dim);padding:2px 6px;border-radius:4px;font-size:10.5px;white-space:nowrap;}
.sc-arrow-ic{font-size:20px;color:#f0a020;text-shadow:0 0 3px #000,0 0 3px #000;}
.sc-map-icon{background:transparent!important;border:none!important;}
.sc-svg-wrap{width:44px;height:44px;filter:drop-shadow(0 3px 3px rgba(0,0,0,.65));}
.sc-svg-wrap svg{display:block;width:44px;height:44px;}
.sc-zone-move-handle{width:22px;height:22px;border-radius:50%;background:#fff;border:2px solid #111827;box-shadow:0 2px 7px rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;color:#111827;font-size:14px;font-weight:800;cursor:move;user-select:none;}
.sc-float-panel{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:var(--bg-panel);border:1px solid var(--sc-amber-dim);border-radius:8px;padding:10px 12px;box-shadow:0 6px 18px rgba(0,0,0,.5);z-index:1200;display:flex;align-items:center;gap:8px;font-size:12px;flex-wrap:wrap;max-width:92vw;}
.sc-float-panel.hidden{display:none;}
.sc-float-panel .sc-fp-title{color:var(--ink-faint);font-size:11px;width:100%;}
.sc-float-panel input[type=number]{width:70px;background:#1b1f26;border:1px solid var(--sc-line);color:var(--ink);border-radius:5px;padding:5px 6px;font-size:12px;}
.sc-float-panel select{background:#1b1f26;border:1px solid var(--sc-line);color:var(--ink);border-radius:5px;padding:5px 6px;font-size:12px;font-family:inherit;}
.sc-search{position:relative;z-index:2;width:100%;background:var(--bg-panel-2);border-bottom:1px solid var(--line);padding:10px 12px;}
.sc-search-row{display:flex;gap:8px;max-width:760px;margin:0 auto}.sc-search-row input{margin:0}.sc-search-row .btn{min-width:86px}.sc-search-results{max-height:180px;overflow:auto;margin:6px auto 0;max-width:760px;background:var(--bg-panel);border-radius:7px}.sc-search-results:empty{display:none}.sc-search-item{padding:8px 10px;border-top:1px solid var(--line-soft);font-size:11px;cursor:pointer}.sc-search-item:first-child{border-top:none}.sc-search-item:hover{background:var(--bg-panel-2)}
.sc-nearby-hospital{background:transparent!important;border:none!important}.sc-nearby-pin{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#fff;border:2px solid #16a34a;box-shadow:0 2px 7px rgba(0,0,0,.55);font-size:16px}.sc-search-status{font-size:10.5px;color:var(--ink-faint);max-width:760px;margin:5px auto 0}
@media (max-width:760px){
  #scRoot{height:82vh;min-height:560px;}
  .sc-search-row{max-width:none;}
  #scRoot .sc-sidebar{position:absolute;left:0;top:41px;bottom:25px;z-index:1000;transform:translateX(-100%);transition:.2s;width:220px;}
  #scRoot .sc-sidebar.open{transform:translateX(0);}
}

/* ---------- Read-only Scene Viewer (persistent floating panel) ---------- */
.sv-tent-icon, .sv-vehicle-icon{background:transparent!important;border:none!important;}
#sceneViewerHost{
  position:fixed; right:16px; bottom:16px; z-index:1400;
  width:360px; max-width:calc(100vw - 24px);
  background:var(--bg-panel); border:1px solid var(--line); border-radius:10px;
  box-shadow:0 8px 28px rgba(0,0,0,.45);
  display:flex; flex-direction:column; overflow:hidden;
  transition:height .15s;
}
#sceneViewerHost.hidden{display:none;}
#sceneViewerHost .sv-head{
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 12px; background:var(--bg-panel-2); border-bottom:1px solid var(--line);
  font-size:12.5px; font-weight:600; color:var(--ink);
}
#sceneViewerHost .sv-toggle{
  background:transparent; border:1px solid var(--line); color:var(--ink-dim);
  border-radius:6px; width:24px; height:24px; cursor:pointer; font-size:13px; line-height:1;
}
#sceneViewerHost #sceneViewerMap{height:280px; background:#0d0f13;}
#sceneViewerHost.collapsed #sceneViewerMap{display:none;}
@media (max-width:640px){
  #sceneViewerHost{right:8px; bottom:8px; width:280px;}
  #sceneViewerHost #sceneViewerMap{height:220px;}
}

/* On/off toggle switch used for game settings (map, distance calc, etc.) */
.toggle-row{display:flex;align-items:center;gap:10px;}
.toggle-switch{position:relative;display:inline-block;width:42px;height:24px;flex-shrink:0;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#4b5160;border-radius:999px;transition:.15s;}
.toggle-slider:before{content:"";position:absolute;height:18px;width:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.4);}
.toggle-switch input:checked + .toggle-slider{background:#22c55e;}
.toggle-switch input:checked + .toggle-slider:before{transform:translateX(18px);}
.toggle-switch input:disabled + .toggle-slider{opacity:.4;cursor:not-allowed;}
.toggle-label{font-size:12.5px;color:var(--ink);}
</style>
</head>
<body>
<div id="app"></div>
<div id="sceneViewerHost" class="hidden">
  <div class="sv-head"><span>🗺️ Scene Map</span><button type="button" class="sv-toggle" id="sceneViewerToggle" title="ย่อ/ขยาย">—</button></div>
  <div id="sceneViewerMap"></div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script>
/* ============================================================
   SCENE SETUP MODULE (embedded, namespaced as window.SceneApp)
   Adapted from the standalone Scene Setup prototype. Mounted/destroyed
   by the main app's render() only when GM is on the "Scene Setup" tab,
   since its Leaflet map instance can't survive innerHTML replacement.
   `items` (tents/zones/routes) is kept at module scope so an in-progress,
   unpublished draft survives the GM switching tabs and coming back within
   the same page session — only a full page reload clears it (falls back
   to whatever was last published/loaded from Firebase, same as before).
   Firebase I/O and the publish/skip gate live in the main app; this module
   only exposes serialize()/loadScenario() plus mount()/destroy().
============================================================ */
window.SceneApp = (function(){
  'use strict';

  const TENT_TYPES = [
    {id:'incident',  label:'จุดเกิดเหตุ',            iconKind:'fire',      color:'#ef4444'},
    {id:'primary',   label:'Primary Triage',          iconKind:'tent',      color:'#3b82f6'},
    {id:'secondary', label:'Secondary Triage',        iconKind:'tent',      color:'#8b5cf6'},
    {id:'red',       label:'Treatment แดง',           iconKind:'treatment', color:'#ef4444'},
    {id:'yellow',    label:'Treatment เหลือง',        iconKind:'treatment', color:'#facc15'},
    {id:'green',     label:'Treatment เขียว',         iconKind:'treatment', color:'#22c55e'},
    {id:'black',     label:'Black / Expectant',       iconKind:'treatment', color:'#111827'},
    {id:'loading',   label:'Loading',                 iconKind:'ambulance', color:'#a855f7'},
    {id:'parking',   label:'Parking / Staging',       iconKind:'parking',   color:'#38bdf8'},
    {id:'hospital',  label:'โรงพยาบาล',               iconKind:'hospital',  color:'#16a34a'},
    {id:'command',   label:'Command Post',            iconKind:'command',   color:'#f59e0b'},
    {id:'decon',     label:'จุดล้างสารปนเปื้อน',        iconKind:'decon',     color:'#06b6d4'},
  ];

  function tentSvg(t, size){
    size = size || 38;
    const c = t.color, stroke = '#111827';
    const common = 'width="'+size+'" height="'+size+'" viewBox="0 0 48 48" aria-hidden="true"';
    if(t.iconKind === 'fire'){
      return '<svg '+common+'><path d="M26 4c2 8-5 10-2 17 2-3 5-5 7-9 7 8 10 15 7 23-3 7-10 10-17 8C12 41 7 34 9 26c2-7 8-11 12-17 1 6 1 9 5 12-1-7 4-11 0-17z" fill="#f97316" stroke="'+stroke+'" stroke-width="2"/><path d="M24 24c5 5 6 9 3 13-2 3-7 3-10 0-3-4-1-9 4-13 0 4 1 6 3 7 1-2 1-4 0-7z" fill="#fde047"/></svg>';
    }
    if(t.iconKind === 'tent' || t.iconKind === 'treatment'){
      const dot = t.iconKind === 'treatment' ? '<circle cx="24" cy="29" r="7" fill="'+c+'" stroke="#fff" stroke-width="2"/>' : '';
      return '<svg '+common+'><path d="M6 39L23 10l19 29H6z" fill="'+c+'" stroke="'+stroke+'" stroke-width="2.4"/><path d="M23 10v29" stroke="#fff" stroke-width="2" opacity=".9"/><path d="M23 10L12 39" stroke="#fff" stroke-width="1.6" opacity=".75"/>'+dot+'</svg>';
    }
    if(t.iconKind === 'ambulance'){
      return '<svg '+common+'><rect x="5" y="14" width="27" height="20" rx="3" fill="#fff" stroke="'+stroke+'" stroke-width="2"/><path d="M32 21h7l4 7v6H32V21z" fill="'+c+'" stroke="'+stroke+'" stroke-width="2"/><path d="M17 18v12M11 24h12" stroke="#ef4444" stroke-width="4"/><circle cx="13" cy="36" r="4" fill="#374151"/><circle cx="36" cy="36" r="4" fill="#374151"/></svg>';
    }
    if(t.iconKind === 'parking'){
      return '<svg '+common+'><rect x="6" y="5" width="36" height="38" rx="7" fill="'+c+'" stroke="'+stroke+'" stroke-width="2"/><path d="M17 36V13h10c7 0 11 4 11 10s-4 10-11 10h-4v3h-6zm6-9h4c3 0 5-1 5-4s-2-4-5-4h-4v8z" fill="#fff"/></svg>';
    }
    if(t.iconKind === 'hospital'){
      return '<svg '+common+'><path d="M8 42V12h32v30H8z" fill="#fff" stroke="'+stroke+'" stroke-width="2"/><path d="M18 5h12v14H18z" fill="'+c+'" stroke="'+stroke+'" stroke-width="2"/><path d="M24 8v8M20 12h8" stroke="#fff" stroke-width="3"/><path d="M14 24h6v6h-6zm14 0h6v6h-6zM21 34h6v8h-6z" fill="'+c+'"/></svg>';
    }
    if(t.iconKind === 'command'){
      return '<svg '+common+'><circle cx="24" cy="24" r="19" fill="'+c+'" stroke="'+stroke+'" stroke-width="2"/><circle cx="24" cy="24" r="10" fill="none" stroke="#fff" stroke-width="3"/><path d="M24 7v9M24 32v9M7 24h9M32 24h9" stroke="#fff" stroke-width="3"/></svg>';
    }
    if(t.iconKind === 'decon'){
      return '<svg '+common+'><path d="M24 5C18 14 12 21 12 29a12 12 0 0024 0c0-8-6-15-12-24z" fill="'+c+'" stroke="'+stroke+'" stroke-width="2"/><path d="M18 29c2 5 6 7 11 5" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>';
    }
    return '<svg '+common+'><circle cx="24" cy="24" r="18" fill="'+c+'" stroke="'+stroke+'" stroke-width="2"/></svg>';
  }

  const ZONE_TYPES = [
    {id:'hot',  label:'Hot Zone (อันตราย)',  color:'#e5484d', fill:'#e5484d'},
    {id:'warm', label:'Warm Zone (เฝ้าระวัง)', color:'#f0c020', fill:'#f0c020'},
    {id:'cold', label:'Cold Zone (ปลอดภัย)', color:'#3fb56f', fill:'#3fb56f'},
  ];
  const ROUTE_TYPES = [
    {id:'entry', label:'ทางเข้ารถฉุกเฉิน', icon:'➡️'},
    {id:'exit', label:'ทางออกรถฉุกเฉิน', icon:'⬅️'},
    {id:'closed', label:'ถนนปิด', icon:'⛔'},
    {id:'patient', label:'เส้นทางเคลื่อนย้ายผู้ป่วย', icon:'🚶'}
  ];

  let map=null, layerGroups=null, items=null, idCounter=1;
  let mode=null, routeDraft=null, zoneDraft=null, zoneDragging=false, suppressNextMapClick=false;
  let lastSnapshot=null;      // captured on destroy() so re-opening the tab restores the unpublished draft
  let skipSnapshotOnDestroy=false;
  let nearbyHospitalLayer=null;
  let hospitalOptions=[];     // STATE.hospitals names, refreshed on each mount

  function currentHospitalNames(){
    const placed = items && items.tents ? items.tents.filter(function(t){return t.typeId==='hospital';}).map(function(t){return t.name;}) : [];
    return Array.from(new Set((placed.length ? placed : hospitalOptions).filter(Boolean)));
  }
  function hospitalSelectHtml(selected){
    let opts = '<option value="">— ไม่ผูกกับ รพ. —</option>';
    currentHospitalNames().forEach(function(name){
      opts += '<option value="'+esc(name)+'" '+(selected===name?'selected':'')+'>'+esc(name)+'</option>';
    });
    return opts;
  }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

  function buildTools(){
    const tentBox = document.getElementById('tentTools');
    tentBox.innerHTML='';
    TENT_TYPES.forEach(function(t){
      const el = document.createElement('div');
      el.className='sc-tool';
      el.dataset.mode = 'tent:'+t.id;
      el.innerHTML = '<span class="sc-ic">'+tentSvg(t,22)+'</span><span class="lbl">'+t.label+'</span>';
      el.onclick = function(){ setMode('tent:'+t.id, el); };
      tentBox.appendChild(el);
    });
    const zoneBox = document.getElementById('zoneTools');
    zoneBox.innerHTML='';
    ZONE_TYPES.forEach(function(z){
      const el = document.createElement('div');
      el.className='sc-tool';
      el.dataset.mode = 'zone:'+z.id;
      el.innerHTML = '<span class="sc-ic" style="background:'+z.color+';width:14px;height:14px;border-radius:3px;"></span><span class="lbl">'+z.label+'</span>';
      el.onclick = function(){ setMode('zone:'+z.id, el); };
      zoneBox.appendChild(el);
    });
    const routeBox = document.getElementById('routeTools');
    routeBox.innerHTML='';
    ROUTE_TYPES.forEach(function(r){
      const el = document.createElement('div');
      el.className='sc-tool';
      el.dataset.mode = 'route:'+r.id;
      el.innerHTML = '<span class="sc-ic">'+r.icon+'</span><span class="lbl">'+r.label+'</span>';
      el.onclick = function(){ setMode('route:'+r.id, el); };
      routeBox.appendChild(el);
    });
    const finishEl = document.createElement('div');
    finishEl.className='sc-tool';
    finishEl.style.display='none';
    finishEl.id='finishRouteBtn';
    finishEl.innerHTML = '<span class="sc-ic">✔️</span><span class="lbl">จบเส้นทางนี้ (ดับเบิลคลิกก็ได้)</span>';
    finishEl.onclick = finishRoute;
    routeBox.appendChild(finishEl);
  }

  function setMode(newMode, el){
    if(routeDraft) cancelRouteDraft();
    if(zoneDraft) cancelZoneDraft();
    if(mode === newMode){
      mode = null;
      document.querySelectorAll('#scRoot .sc-tool').forEach(function(e){ e.classList.remove('active'); });
      updateStatus();
      return;
    }
    mode = newMode;
    document.querySelectorAll('#scRoot .sc-tool').forEach(function(e){ e.classList.remove('active'); });
    if(el) el.classList.add('active');
    const fb = document.getElementById('finishRouteBtn');
    if(fb) fb.style.display = (mode && mode.indexOf('route:')===0) ? 'flex' : 'none';
    updateStatus();
  }

  function updateStatus(){
    const statusText = document.getElementById('statusText');
    if(!statusText) return;
    if(!mode){ statusText.textContent = 'โหมด: เลื่อนแผนที่ปกติ'; return; }
    if(mode.indexOf('tent:')===0){
      const t = TENT_TYPES.find(function(x){return x.id===mode.split(':')[1];});
      statusText.textContent = 'โหมด: แตะบนแผนที่เพื่อวาง "'+t.label+'"';
    } else if(mode.indexOf('zone:')===0){
      const z = ZONE_TYPES.find(function(x){return x.id===mode.split(':')[1];});
      statusText.textContent = 'โหมด: กดค้างแล้วลากกำหนดรัศมี "'+z.label+'"';
    } else if(mode.indexOf('route:')===0){
      const rt = ROUTE_TYPES.find(function(x){return x.id===mode.split(':')[1];});
      statusText.textContent = 'โหมด: วาด '+(rt?rt.label:'')+' — คลิกตามแนวเส้น ดับเบิลคลิกเพื่อจบ';
    }
  }

  function handleMapAction(latlng){
    if(!mode) return;
    if(mode.indexOf('tent:')===0) placeTent(mode.split(':')[1], latlng);
    else if(mode.indexOf('route:')===0) addRoutePoint(latlng, mode.split(':')[1]);
  }

  function wireShapeClick(layer){
    layer.on('click', function(e){
      if(mode){ layer.closePopup(); L.DomEvent.stop(e); handleMapAction(e.latlng); }
    });
  }

  /* ---------------- TENTS ---------------- */
  function makeTentIcon(t){
    return L.divIcon({className:'sc-map-icon', html:'<div class="sc-svg-wrap">'+tentSvg(t,44)+'</div>', iconSize:[44,44], iconAnchor:[22,40], popupAnchor:[0,-38]});
  }
  function placeTent(typeId, latlng){
    const t = TENT_TYPES.find(function(x){return x.id===typeId;});
    const id = 'tent_'+(idCounter++);
    const marker = L.marker(latlng, {icon: makeTentIcon(t), draggable:true});
    const rec = {id:id, typeId:typeId, name:t.label, latlng:latlng, linkedHospitalName:null, redCap:0, yellowCap:0, greenCap:0};
    marker.on('drag', function(){ rec.latlng = marker.getLatLng(); });
    marker.on('dragend', function(){ refreshLegend(); });
    marker.bindPopup(function(){ return buildTentPopup(rec, marker); });
    wireShapeClick(marker);
    marker.addTo(layerGroups.tents);
    rec.marker = marker;
    items.tents.push(rec);
    refreshLegend(); updateCount();
  }
  function buildTentPopup(rec, marker){
    const div = document.createElement('div');
    div.className = 'sc-popup';
    const hospField = rec.typeId==='hospital'
      ? '<label style="font-size:10.5px;color:var(--ink-faint);">ชื่อและความจุโรงพยาบาล</label>'
        +'<div class="sc-row"><input type="number" min="0" data-role="redCap" value="'+(rec.redCap||0)+'" placeholder="Red"><input type="number" min="0" data-role="yellowCap" value="'+(rec.yellowCap||0)+'" placeholder="Yellow"><input type="number" min="0" data-role="greenCap" value="'+(rec.greenCap||0)+'" placeholder="Green"></div>'
        +'<div style="font-size:10px;color:var(--ink-faint);margin:-2px 0 6px;">Red / Yellow / Green capacity</div>'
      : '';
    div.innerHTML = '<input type="text" value="'+rec.name.replace(/"/g,'&quot;')+'" placeholder="ชื่อโรงพยาบาล" />'+hospField+'<div class="sc-row"><button class="btn" data-act="save">บันทึก</button><button class="btn danger" data-act="del">ลบ</button></div>';
    div.querySelector('[data-act=save]').onclick = function(){
      rec.name = div.querySelector('input[type=text]').value || rec.name;
      if(rec.typeId==='hospital'){
        rec.redCap = Number(div.querySelector('[data-role=redCap]').value)||0;
        rec.yellowCap = Number(div.querySelector('[data-role=yellowCap]').value)||0;
        rec.greenCap = Number(div.querySelector('[data-role=greenCap]').value)||0;
        rec.linkedHospitalName = rec.name;
      }
      marker.closePopup(); refreshLegend();
    };
    div.querySelector('[data-act=del]').onclick = function(){
      layerGroups.tents.removeLayer(marker);
      items.tents = items.tents.filter(function(x){return x.id!==rec.id;});
      refreshLegend(); updateCount();
    };
    return div;
  }

  /* ---------------- ZONES ---------------- */
  function wireZonePanelOnce(){
    const radiusPanel = document.getElementById('radiusPanel');
    L.DomEvent.disableClickPropagation(radiusPanel);
    L.DomEvent.disableScrollPropagation(radiusPanel);
    ['pointerdown','mousedown','mouseup','click','dblclick','touchstart','touchend'].forEach(function(type){
      radiusPanel.addEventListener(type, function(ev){ ev.stopPropagation(); });
    });
    document.getElementById('radiusInput').addEventListener('input', function(){
      if(!zoneDraft) return;
      const v = parseFloat(document.getElementById('radiusInput').value);
      if(!isNaN(v) && v>=5) zoneDraft.circle.setRadius(v);
    });
    document.getElementById('radiusConfirm').onclick = function(ev){
      ev.preventDefault(); ev.stopPropagation();
      suppressNextMapClick = true;
      if(!zoneDraft) return;
      const v = parseFloat(document.getElementById('radiusInput').value);
      if(!isNaN(v) && v>=5) zoneDraft.circle.setRadius(v);
      const z = ZONE_TYPES.find(function(x){return x.id===zoneDraft.typeId;});
      finalizeZone(zoneDraft, z);
      zoneDraft = null;
      radiusPanel.classList.add('hidden');
      setMode(null);
    };
    document.getElementById('radiusCancel').onclick = function(ev){
      ev.preventDefault(); ev.stopPropagation();
      suppressNextMapClick = true;
      cancelZoneDraft();
    };
  }
  function beginZonePointer(typeId, latlng){
    if(zoneDraft) cancelZoneDraft();
    const z = ZONE_TYPES.find(function(x){return x.id===typeId;});
    zoneDragging = true;
    map.dragging.disable();
    zoneDraft = {typeId:typeId, center:latlng, circle: L.circle(latlng, {radius:5, color:z.color, fillColor:z.fill, fillOpacity:.18, weight:2, dashArray:'5 5', interactive:false}).addTo(layerGroups.zones)};
    document.getElementById('radiusInput').value = 5;
    document.getElementById('radiusPanel').classList.add('hidden');
    document.getElementById('statusText').textContent = 'กดค้างแล้วลากเพื่อกำหนดรัศมี "'+z.label+'" จากนั้นปล่อยเมาส์';
  }
  function resizeZonePointer(latlng){
    if(!zoneDragging || !zoneDraft) return;
    const r = Math.max(zoneDraft.center.distanceTo(latlng), 5);
    zoneDraft.circle.setRadius(r);
    document.getElementById('radiusInput').value = Math.round(r);
  }
  function endZonePointer(){
    if(!zoneDragging || !zoneDraft) return;
    zoneDragging = false;
    map.dragging.enable();
    suppressNextMapClick = true;
    document.getElementById('radiusPanel').classList.remove('hidden');
    const z = ZONE_TYPES.find(function(x){return x.id===zoneDraft.typeId;});
    document.getElementById('statusText').textContent = 'รัศมี '+Math.round(zoneDraft.circle.getRadius())+' เมตร — ปรับตัวเลขหรือกดยืนยัน "'+z.label+'"';
  }
  function makeZoneMoveHandle(rec){
    const icon = L.divIcon({className:'', html:'<div class="sc-zone-move-handle" title="ลากเพื่อย้ายโซน">✥</div>', iconSize:[22,22], iconAnchor:[11,11]});
    const handle = L.marker(rec.center, {icon:icon, draggable:true, bubblingMouseEvents:false, keyboard:false, zIndexOffset:500}).addTo(layerGroups.zones);
    handle.bindTooltip('ลากเพื่อย้ายโซน', {direction:'top', offset:[0,-10]});
    handle.on('dragstart', function(){ rec.circle.closePopup(); if(map.dragging) map.dragging.disable(); });
    handle.on('drag', function(){ const pos = handle.getLatLng(); rec.center = pos; rec.circle.setLatLng(pos); });
    handle.on('dragend', function(){ const pos = handle.getLatLng(); rec.center = pos; rec.circle.setLatLng(pos); if(map.dragging) map.dragging.enable(); refreshLegend(); });
    return handle;
  }
  function finalizeZone(draft, z){
    const id = 'zone_'+(idCounter++);
    const rec = {id:id, typeId:z.id, name:z.label, center:draft.center, radius:draft.circle.getRadius(), circle:draft.circle};
    draft.circle.setStyle({dashArray:null});
    draft.circle.bindPopup(function(){ return buildZonePopup(rec); });
    wireShapeClick(draft.circle);
    rec.moveHandle = makeZoneMoveHandle(rec);
    items.zones.push(rec);
    refreshLegend(); updateCount();
  }
  function buildZonePopup(rec){
    const div = document.createElement('div');
    div.className = 'sc-popup';
    div.innerHTML = '<input type="text" value="'+rec.name.replace(/"/g,'&quot;')+'" />'
      +'<div class="sc-row" style="margin-bottom:6px;"><input type="number" min="5" value="'+Math.round(rec.radius)+'" data-role="radiusEdit" style="margin-bottom:0;"><button class="btn" data-act="setRadius">ตั้งรัศมี (ม.)</button></div>'
      +'<div class="sc-row"><button class="btn" data-act="save">บันทึกชื่อ</button><button class="btn danger" data-act="del">ลบ</button></div>';
    div.querySelector('[data-act=save]').onclick = function(){
      rec.name = div.querySelector('input[type=text]').value || rec.name;
      rec.circle.closePopup(); refreshLegend();
    };
    div.querySelector('[data-act=setRadius]').onclick = function(){
      const v = parseFloat(div.querySelector('[data-role=radiusEdit]').value);
      if(!isNaN(v) && v>0){ rec.radius = v; rec.circle.setRadius(v); }
    };
    div.querySelector('[data-act=del]').onclick = function(){
      layerGroups.zones.removeLayer(rec.circle);
      if(rec.moveHandle) layerGroups.zones.removeLayer(rec.moveHandle);
      items.zones = items.zones.filter(function(x){return x.id!==rec.id;});
      refreshLegend(); updateCount();
    };
    return div;
  }
  function cancelZoneDraft(){
    if(!zoneDraft) return;
    layerGroups.zones.removeLayer(zoneDraft.circle);
    zoneDraft = null;
    zoneDragging = false;
    if(map.dragging) map.dragging.enable();
    document.getElementById('radiusPanel').classList.add('hidden');
    updateStatus();
  }

  /* ---------------- ROUTES ---------------- */
  function routeStyle(typeId, draft){
    const styles = {entry:{color:'#22c55e',dashArray:null}, exit:{color:'#38bdf8',dashArray:null}, closed:{color:'#ef4444',dashArray:'10 8'}, patient:{color:'#a855f7',dashArray:'5 7'}};
    const st = styles[typeId] || styles.entry;
    return {color:st.color, weight:typeId==='closed'?6:4, dashArray: draft ? '6 6' : st.dashArray};
  }
  function addRoutePoint(latlng, typeId){
    if(!routeDraft){
      routeDraft = {typeId:typeId, latlngs:[latlng], polyline: L.polyline([latlng], routeStyle(typeId, true)).addTo(layerGroups.routes), vmarkers:[]};
    } else {
      routeDraft.latlngs.push(latlng);
      routeDraft.polyline.setLatLngs(routeDraft.latlngs);
    }
    const st = routeStyle(routeDraft.typeId);
    const vm = L.circleMarker(latlng, {radius:4, color:st.color, fillColor:st.color, fillOpacity:1}).addTo(layerGroups.routes);
    routeDraft.vmarkers.push(vm);
  }
  function finishRoute(){
    if(!routeDraft || routeDraft.latlngs.length < 2){ cancelRouteDraft(); return; }
    routeDraft.polyline.setStyle(routeStyle(routeDraft.typeId));
    routeDraft.vmarkers.forEach(function(vm){ layerGroups.routes.removeLayer(vm); });
    if(routeDraft.typeId==='closed' || routeDraft.typeId==='patient'){
      completeRoute(routeDraft, routeDraft.typeId==='closed' ? 'closed' : 'both');
      setMode(null);
      return;
    }
    document.getElementById('routeDirPanel').classList.remove('hidden');
    document.getElementById('statusText').textContent = 'เลือกทิศทางของเส้นทางนี้';
  }
  function bearingDeg(p1,p2){
    const lat1=p1.lat*Math.PI/180, lat2=p2.lat*Math.PI/180;
    const dLng=(p2.lng-p1.lng)*Math.PI/180;
    const y=Math.sin(dLng)*Math.cos(lat2);
    const x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLng);
    return (Math.atan2(y,x)*180/Math.PI + 360) % 360;
  }
  function directionText(direction, oneWayMin){
    if(direction==='to')   return '➡ ขาไป (เกิดเหตุ → รพ.) · '+oneWayMin.toFixed(1)+' นาที';
    if(direction==='from') return '⬅ ขากลับ (รพ. → เกิดเหตุ) · '+oneWayMin.toFixed(1)+' นาที';
    return '🔁 ไป-กลับ · '+oneWayMin.toFixed(1)+' นาที/เที่ยว · '+(oneWayMin*2).toFixed(1)+' นาที รวม';
  }
  function buildRouteArrows(latlngs, direction){
    const markers = [];
    const n = latlngs.length;
    if(direction==='both' || direction==='to'){
      const deg = bearingDeg(latlngs[n-2], latlngs[n-1]);
      markers.push(L.marker(latlngs[n-1], {icon:L.divIcon({className:'', html:'<div class="sc-arrow-ic" style="transform:rotate('+deg+'deg)">➤</div>', iconSize:[22,22], iconAnchor:[11,11]}), interactive:false}));
    }
    if(direction==='both' || direction==='from'){
      const deg = bearingDeg(latlngs[1], latlngs[0]);
      markers.push(L.marker(latlngs[0], {icon:L.divIcon({className:'', html:'<div class="sc-arrow-ic" style="transform:rotate('+deg+'deg)">➤</div>', iconSize:[22,22], iconAnchor:[11,11]}), interactive:false}));
    }
    markers.forEach(function(m){ m.addTo(layerGroups.routes); });
    return markers;
  }
  function routeDistance(latlngs){
    let d = 0;
    for(let i=1;i<latlngs.length;i++) d += latlngs[i-1].distanceTo(latlngs[i]);
    return d;
  }
  function completeRoute(draft, direction){
    const distM = routeDistance(draft.latlngs);
    const speed = parseFloat(document.getElementById('speedInput').value) || 30;
    const oneWayMin = (distM/1000) / speed * 60;
    const id = 'route_'+(idCounter++);
    const routeLabels = {entry:'ทางเข้ารถฉุกเฉิน', exit:'ทางออกรถฉุกเฉิน', closed:'ถนนปิด', patient:'ทางเคลื่อนย้ายผู้ป่วย'};
    const name = (routeLabels[draft.typeId] || 'เส้นทาง')+' '+(items.routes.length+1);
    const mid = draft.latlngs[Math.floor(draft.latlngs.length/2)];
    const labelIcon = L.divIcon({className:'', html:'<div class="sc-route-label">'+(direction==='closed' ? '⛔ ถนนปิด · '+(distM/1000).toFixed(2)+' กม' : (distM/1000).toFixed(2)+' กม · '+directionText(direction, oneWayMin))+'</div>', iconSize:null});
    const label = L.marker(mid, {icon:labelIcon, interactive:false}).addTo(layerGroups.routes);
    const arrows = buildRouteArrows(draft.latlngs, direction);
    const rec = {id:id, name:name, typeId:draft.typeId || 'entry', latlngs:draft.latlngs, distM:distM, speed:speed, oneWayMin:oneWayMin, direction:direction, linkedHospitalName:null, polyline:draft.polyline, label:label, arrows:arrows};
    rec.polyline.bindPopup(function(){ return buildRoutePopup(rec); });
    wireShapeClick(rec.polyline);
    items.routes.push(rec);
    routeDraft = null;
    refreshLegend(); updateCount();
  }
  function redrawRouteLabel(rec){
    layerGroups.routes.removeLayer(rec.label);
    rec.arrows.forEach(function(a){ layerGroups.routes.removeLayer(a); });
    const mid = rec.latlngs[Math.floor(rec.latlngs.length/2)];
    const labelIcon = L.divIcon({className:'', html:'<div class="sc-route-label">'+(rec.distM/1000).toFixed(2)+' กม · '+directionText(rec.direction, rec.oneWayMin)+'</div>', iconSize:null});
    rec.label = L.marker(mid, {icon:labelIcon, interactive:false}).addTo(layerGroups.routes);
    rec.arrows = buildRouteArrows(rec.latlngs, rec.direction);
  }
  function cancelRouteDraft(){
    if(!routeDraft) return;
    layerGroups.routes.removeLayer(routeDraft.polyline);
    routeDraft.vmarkers.forEach(function(vm){ layerGroups.routes.removeLayer(vm); });
    routeDraft = null;
    document.getElementById('routeDirPanel').classList.add('hidden');
  }
  function buildRoutePopup(rec){
    const div = document.createElement('div');
    div.className = 'sc-popup';
    div.innerHTML = '<input type="text" value="'+rec.name.replace(/"/g,'&quot;')+'" />'
      +'<div style="font-size:10.5px;color:var(--ink-faint);margin:2px 0 8px;">'+(rec.distM/1000).toFixed(2)+' กม ทั้งเส้น ('+rec.speed+' km/h)</div>'
      +'<div class="sc-row" style="margin-bottom:6px;"><select data-role="dirEdit">'
      +   '<option value="both" '+(rec.direction==='both'?'selected':'')+'>🔁 ไป-กลับ</option>'
      +   '<option value="to" '+(rec.direction==='to'?'selected':'')+'>➡ ขาไปเท่านั้น</option>'
      +   '<option value="from" '+(rec.direction==='from'?'selected':'')+'>⬅ ขากลับเท่านั้น</option>'
      +   '</select><input type="number" min="1" data-role="speedEdit" value="'+rec.speed+'" style="width:56px;"></div>'
      +'<label style="font-size:10.5px;color:var(--ink-faint);">ผูกกับโรงพยาบาลปลายทาง (สำหรับคำนวณเวลา dispatch)</label>'
      +'<select data-role="hospLink">'+hospitalSelectHtml(rec.linkedHospitalName)+'</select>'
      +'<div class="sc-row"><button class="btn" data-act="save">บันทึก</button><button class="btn danger" data-act="del">ลบ</button></div>';
    div.querySelector('[data-act=save]').onclick = function(){
      rec.name = div.querySelector('input[type=text]').value || rec.name;
      rec.direction = div.querySelector('[data-role=dirEdit]').value;
      const sp = parseFloat(div.querySelector('[data-role=speedEdit]').value);
      if(!isNaN(sp) && sp>0){ rec.speed = sp; rec.oneWayMin = (rec.distM/1000)/rec.speed*60; }
      rec.linkedHospitalName = div.querySelector('[data-role=hospLink]').value || null;
      redrawRouteLabel(rec);
      rec.polyline.closePopup(); refreshLegend();
    };
    div.querySelector('[data-act=del]').onclick = function(){
      layerGroups.routes.removeLayer(rec.polyline);
      layerGroups.routes.removeLayer(rec.label);
      rec.arrows.forEach(function(a){ layerGroups.routes.removeLayer(a); });
      items.routes = items.routes.filter(function(x){return x.id!==rec.id;});
      refreshLegend(); updateCount();
    };
    return div;
  }

  /* ---------------- LEGEND ---------------- */
  function refreshLegend(){
    const box = document.getElementById('legendList');
    if(!box) return;
    box.innerHTML = '';
    const all = items.tents.map(function(x){ return Object.assign({},x,{kind:'tent'}); })
      .concat(items.zones.map(function(x){ return Object.assign({},x,{kind:'zone'}); }))
      .concat(items.routes.map(function(x){ return Object.assign({},x,{kind:'route'}); }));
    if(all.length===0){
      box.innerHTML = '<div class="sc-empty-note">ยังไม่มีรายการ — เลือกเครื่องมือด้านบนแล้วแตะบนแผนที่</div>';
      return;
    }
    all.forEach(function(rec){
      const row = document.createElement('div');
      row.className='sc-legend-item';
      let icon = '📍';
      if(rec.kind==='tent'){ const tt=TENT_TYPES.find(function(t){return t.id===rec.typeId;}); icon = tt ? tentSvg(tt,20) : '📍'; }
      if(rec.kind==='zone') icon = '⬤';
      if(rec.kind==='route') icon = '🛣️';
      row.innerHTML = '<span>'+icon+'</span><span class="sc-lname">'+esc(rec.name)+(rec.linkedHospitalName?' <span style="color:var(--sc-amber);">('+esc(rec.linkedHospitalName)+')</span>':'')+'</span><span class="sc-ldel">✕</span>';
      row.querySelector('.sc-lname').onclick = function(){
        const target = rec.kind==='tent' ? rec.latlng : (rec.kind==='zone' ? rec.center : rec.latlngs[0]);
        map.setView(target, Math.max(map.getZoom(),17));
        const layer = rec.kind==='tent' ? items.tents.find(function(x){return x.id===rec.id;}).marker
                    : rec.kind==='zone' ? items.zones.find(function(x){return x.id===rec.id;}).circle
                    : items.routes.find(function(x){return x.id===rec.id;}).polyline;
        layer.openPopup(target);
      };
      row.querySelector('.sc-ldel').onclick = function(){
        if(rec.kind==='tent'){
          layerGroups.tents.removeLayer(items.tents.find(function(x){return x.id===rec.id;}).marker);
          items.tents = items.tents.filter(function(x){return x.id!==rec.id;});
        } else if(rec.kind==='zone'){
          const zrec = items.zones.find(function(x){return x.id===rec.id;});
          layerGroups.zones.removeLayer(zrec.circle);
          if(zrec.moveHandle) layerGroups.zones.removeLayer(zrec.moveHandle);
          items.zones = items.zones.filter(function(x){return x.id!==rec.id;});
        } else {
          const r = items.routes.find(function(x){return x.id===rec.id;});
          layerGroups.routes.removeLayer(r.polyline);
          layerGroups.routes.removeLayer(r.label);
          (r.arrows||[]).forEach(function(a){ layerGroups.routes.removeLayer(a); });
          items.routes = items.routes.filter(function(x){return x.id!==rec.id;});
        }
        refreshLegend(); updateCount();
      };
      box.appendChild(row);
    });
  }
  function updateCount(){
    const el = document.getElementById('countText');
    if(el) el.textContent = (items.tents.length + items.zones.length + items.routes.length) + ' จุด';
  }

  /* ---------------- SERIALIZE / LOAD ---------------- */
  function serialize(){
    return {
      center: map.getCenter(), zoom: map.getZoom(),
      tents: items.tents.map(function(t){ return {id:t.id, typeId:t.typeId, name:t.name, lat:t.latlng.lat, lng:t.latlng.lng, linkedHospitalName:t.linkedHospitalName||null, redCap:t.redCap||0, yellowCap:t.yellowCap||0, greenCap:t.greenCap||0}; }),
      zones: items.zones.map(function(z){ return {id:z.id, typeId:z.typeId, name:z.name, lat:z.center.lat, lng:z.center.lng, radius:z.radius}; }),
      routes: items.routes.map(function(r){ return {id:r.id, name:r.name, typeId:r.typeId, speed:r.speed, direction:r.direction, oneWayMin:r.oneWayMin, distM:r.distM, linkedHospitalName:r.linkedHospitalName||null, points:r.latlngs.map(function(p){ return {lat:p.lat,lng:p.lng}; })}; })
    };
  }
  function extractNum(id){
    const m = /_(\d+)$/.exec(id||'');
    return m ? parseInt(m[1],10) : 0;
  }
  function clearAll(){
    layerGroups.tents.clearLayers();
    layerGroups.zones.clearLayers();
    layerGroups.routes.clearLayers();
    items = {tents:[], zones:[], routes:[]};
  }
  function loadScenario(data){
    clearAll();
    if(data.center) map.setView([data.center.lat, data.center.lng], data.zoom||13);
    (data.tents||[]).forEach(function(t){
      const type = TENT_TYPES.find(function(x){return x.id===t.typeId;}) || TENT_TYPES[0];
      const marker = L.marker([t.lat,t.lng], {icon: makeTentIcon(type), draggable:true});
      const rec = {id:t.id, typeId:t.typeId, name:t.name, latlng:L.latLng(t.lat,t.lng), linkedHospitalName:t.linkedHospitalName||null, redCap:t.redCap||0, yellowCap:t.yellowCap||0, greenCap:t.greenCap||0};
      marker.on('drag', function(){ rec.latlng = marker.getLatLng(); });
      marker.on('dragend', function(){ refreshLegend(); });
      marker.bindPopup(function(){ return buildTentPopup(rec, marker); });
      wireShapeClick(marker);
      marker.addTo(layerGroups.tents);
      rec.marker = marker;
      items.tents.push(rec);
      idCounter = Math.max(idCounter, extractNum(t.id)+1);
    });
    (data.zones||[]).forEach(function(z){
      const zt = ZONE_TYPES.find(function(x){return x.id===z.typeId;}) || ZONE_TYPES[0];
      const circle = L.circle([z.lat,z.lng], {radius:z.radius, color:zt.color, fillColor:zt.fill, fillOpacity:.18, weight:2}).addTo(layerGroups.zones);
      const rec = {id:z.id, typeId:z.typeId, name:z.name, center:L.latLng(z.lat,z.lng), radius:z.radius, circle:circle};
      circle.bindPopup(function(){ return buildZonePopup(rec); });
      wireShapeClick(circle);
      rec.moveHandle = makeZoneMoveHandle(rec);
      items.zones.push(rec);
      idCounter = Math.max(idCounter, extractNum(z.id)+1);
    });
    (data.routes||[]).forEach(function(r){
      const latlngs = r.points.map(function(p){ return L.latLng(p.lat,p.lng); });
      const typeId = r.typeId || 'entry';
      const polyline = L.polyline(latlngs, routeStyle(typeId)).addTo(layerGroups.routes);
      const distM = routeDistance(latlngs);
      const speed = r.speed || 30;
      const oneWayMin = (distM/1000)/speed*60;
      const direction = r.direction || 'both';
      const mid = latlngs[Math.floor(latlngs.length/2)];
      const labelIcon = L.divIcon({className:'', html:'<div class="sc-route-label">'+(direction==='closed' ? '⛔ ถนนปิด · '+(distM/1000).toFixed(2)+' กม' : (distM/1000).toFixed(2)+' กม · '+directionText(direction, oneWayMin))+'</div>', iconSize:null});
      const label = L.marker(mid, {icon:labelIcon, interactive:false}).addTo(layerGroups.routes);
      const arrows = buildRouteArrows(latlngs, direction);
      const rec = {id:r.id, name:r.name, typeId:typeId, latlngs:latlngs, distM:distM, speed:speed, oneWayMin:oneWayMin, direction:direction, linkedHospitalName:r.linkedHospitalName||null, polyline:polyline, label:label, arrows:arrows};
      polyline.bindPopup(function(){ return buildRoutePopup(rec); });
      wireShapeClick(polyline);
      items.routes.push(rec);
      idCounter = Math.max(idCounter, extractNum(r.id)+1);
    });
    refreshLegend(); updateCount();
  }

  /* ---------------- FILE IMPORT/EXPORT ---------------- */
  function exportFile(){
    const blob = new Blob([JSON.stringify(serialize(), null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'mci-scene-scenario.json';
    a.click();
    URL.revokeObjectURL(url);
  }
  function triggerImport(){
    const el = document.getElementById('fileInput');
    if(el) el.click();
  }

  /* ---------------- MOUNT / DESTROY ---------------- */
  function wireMapEvents(){
    map.on('click', function(e){
      if(suppressNextMapClick){ suppressNextMapClick=false; return; }
      handleMapAction(e.latlng);
    });
    map.on('dblclick', function(e){
      if(mode && mode.indexOf('route:')===0 && routeDraft) finishRoute();
    });
    map.on('mousedown', function(e){
      if(mode && mode.indexOf('zone:')===0){
        L.DomEvent.preventDefault(e.originalEvent);
        beginZonePointer(mode.split(':')[1], e.latlng);
      }
    });
    map.on('mousemove', function(e){ resizeZonePointer(e.latlng); });
    map.on('mouseup', function(){ endZonePointer(); });
    map.getContainer().addEventListener('mouseleave', function(){ endZonePointer(); });
  }
  function wireRouteDirPanel(){
    document.querySelectorAll('#routeDirPanel [data-dir]').forEach(function(btn){
      btn.onclick = function(){
        if(!routeDraft) return;
        completeRoute(routeDraft, btn.dataset.dir);
        document.getElementById('routeDirPanel').classList.add('hidden');
        setMode(null);
      };
    });
    document.getElementById('routeDirCancel').onclick = function(){
      document.getElementById('routeDirPanel').classList.add('hidden');
      cancelRouteDraft();
      setMode(null);
    };
  }
  function wireFileInput(){
    const fileInput = document.getElementById('fileInput');
    if(!fileInput) return;
    fileInput.onchange = function(e){
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = function(){
        try{
          const data = JSON.parse(reader.result);
          loadScenario(data);
        }catch(err){ alert('ไฟล์ไม่ถูกต้อง: '+err.message); }
      };
      reader.readAsText(file);
      e.target.value = '';
    };
  }


  function clearNearbyHospitals(){
    if(nearbyHospitalLayer) nearbyHospitalLayer.clearLayers();
    const status=document.getElementById('nearbyHospitalStatus');
    if(status) status.textContent='';
  }
  async function showNearbyHospitals(){
    if(!map || !nearbyHospitalLayer) return;
    const status=document.getElementById('nearbyHospitalStatus');
    const center=map.getCenter();
    const radius=10000;
    if(status) status.textContent='กำลังค้นหาโรงพยาบาลในรัศมี 10 กม...';
    nearbyHospitalLayer.clearLayers();
    // overpass-api.de alone is unreliable (rate limits / outages), so try a
    // short list of public Overpass mirrors in order and use the first that
    // actually answers, instead of failing the whole search on one host.
    const OVERPASS_ENDPOINTS=[
      'https://overpass-api.de/api/interpreter',
      'https://overpass.kumi.systems/api/interpreter',
      'https://overpass.openstreetmap.ru/api/interpreter',
      'https://overpass.private.coffee/api/interpreter'
    ];
    try{
      const query='[out:json][timeout:20];(node["amenity"="hospital"](around:'+radius+','+center.lat+','+center.lng+');way["amenity"="hospital"](around:'+radius+','+center.lat+','+center.lng+');relation["amenity"="hospital"](around:'+radius+','+center.lat+','+center.lng+'););out center tags;';
      let json=null, lastErr=null;
      for(const endpoint of OVERPASS_ENDPOINTS){
        try{
          const res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'},body:'data='+encodeURIComponent(query)});
          if(!res.ok) throw new Error('HTTP '+res.status);
          json=await res.json();
          break;
        }catch(e){ lastErr=e; json=null; }
      }
      if(!json) throw lastErr||new Error('ทุก endpoint ไม่ตอบสนอง');
      const seen=new Set(); let count=0;
      (json.elements||[]).forEach(function(x){
        const lat=x.lat!=null?x.lat:(x.center&&x.center.lat), lng=x.lon!=null?x.lon:(x.center&&x.center.lon);
        if(lat==null||lng==null) return;
        const name=(x.tags&&(x.tags['name:th']||x.tags.name||x.tags['name:en']))||'โรงพยาบาล';
        const key=name+'|'+Number(lat).toFixed(5)+'|'+Number(lng).toFixed(5); if(seen.has(key)) return; seen.add(key); count++;
        const icon=L.divIcon({className:'sc-nearby-hospital',html:'<div class="sc-nearby-pin">🏥</div>',iconSize:[30,30],iconAnchor:[15,15]});
        const marker=L.marker([lat,lng],{icon:icon,interactive:true}).addTo(nearbyHospitalLayer);
        marker.bindTooltip(name,{direction:'top'});
        marker.bindPopup('<div class="sc-popup"><b>'+esc(name)+'</b><div style="font-size:10.5px;color:var(--ink-faint);margin:5px 0 8px;">โรงพยาบาลใกล้เคียงจาก OpenStreetMap</div><button class="btn primary" data-nearby-place="1">วางโรงพยาบาลนี้</button></div>');
        marker.on('popupopen',function(ev){
          const btn=ev.popup.getElement()&&ev.popup.getElement().querySelector('[data-nearby-place]');
          if(btn) btn.onclick=function(){ placeTent('hospital',L.latLng(lat,lng)); const rec=items.tents[items.tents.length-1]; if(rec){rec.name=name;rec.linkedHospitalName=name;rec.marker.openPopup();} marker.closePopup(); refreshLegend(); };
        });
      });
      if(status) status.textContent=count?'พบโรงพยาบาล '+count+' แห่ง — กดไอคอนเพื่อวางลงในเกม':'ไม่พบโรงพยาบาลในรัศมี 10 กม.';
    }catch(e){ console.error(e); if(status) status.textContent='ค้นหาโรงพยาบาลใกล้เคียงไม่สำเร็จ กรุณาลองใหม่'; }
  }


  async function searchPlace(){
    const q = (document.getElementById('mapSearchInput')||{}).value || '';
    const box = document.getElementById('mapSearchResults');
    if(!q.trim() || !box) return;
    box.innerHTML = '<div class="sc-search-item">กำลังค้นหา...</div>';
    try{
      const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=6&accept-language=th&q='+encodeURIComponent(q);
      const res = await fetch(url, {headers:{'Accept':'application/json'}});
      const data = await res.json();
      box.innerHTML = data.length ? '' : '<div class="sc-search-item">ไม่พบสถานที่</div>';
      data.forEach(function(x){
        const el=document.createElement('div'); el.className='sc-search-item'; el.textContent=x.display_name;
        el.onclick=function(){ map.setView([Number(x.lat),Number(x.lon)],17); box.innerHTML=''; };
        box.appendChild(el);
      });
    }catch(e){ box.innerHTML='<div class="sc-search-item">ค้นหาไม่สำเร็จ กรุณาลองใหม่</div>'; }
  }
  function wireSearch(){
    const btn=document.getElementById('mapSearchBtn'), inp=document.getElementById('mapSearchInput'), nearbyBtn=document.getElementById('nearbyHospitalBtn'), clearBtn=document.getElementById('clearNearbyHospitalBtn');
    const panel=document.querySelector('#scRoot .sc-search');
    if(panel){ L.DomEvent.disableClickPropagation(panel); L.DomEvent.disableScrollPropagation(panel); }
    if(btn) btn.onclick=searchPlace;
    if(inp) inp.addEventListener('keydown',function(e){ if(e.key==='Enter'){e.preventDefault();searchPlace();} });
    if(nearbyBtn) nearbyBtn.onclick=showNearbyHospitals;
    if(clearBtn) clearBtn.onclick=clearNearbyHospitals;
  }

  function mount(opts){
    hospitalOptions = (opts.hospitals||[]).map(function(h){ return h.name; });
    idCounter = 1; mode=null; routeDraft=null; zoneDraft=null; zoneDragging=false; suppressNextMapClick=false; skipSnapshotOnDestroy=false;

    map = L.map('map', {zoomControl:false}).setView([18.286464, 99.506049], 15); // Lampang Hospital default
    L.control.zoom({position:'bottomright'}).addTo(map);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19, attribution:'&copy; OpenStreetMap contributors'}).addTo(map);
    layerGroups = {tents:L.layerGroup().addTo(map), zones:L.layerGroup().addTo(map), routes:L.layerGroup().addTo(map)};
    nearbyHospitalLayer=L.layerGroup().addTo(map);
    items = {tents:[], zones:[], routes:[]};

    wireMapEvents();
    wireZonePanelOnce();
    wireRouteDirPanel();
    wireFileInput();
    wireSearch();
    buildTools();

    const dataToLoad = lastSnapshot || opts.data;
    if(dataToLoad) loadScenario(dataToLoad);
    else updateCount();

    setTimeout(function(){ if(map) map.invalidateSize(); }, 60);
  }

  function destroy(){
    if(!map) return;
    if(!skipSnapshotOnDestroy){ try{ lastSnapshot = serialize(); }catch(e){} }
    skipSnapshotOnDestroy=false;
    map.remove();
    map=null; layerGroups=null; nearbyHospitalLayer=null; mode=null; routeDraft=null; zoneDraft=null;
  }

<script>
/* ============================================================
   READ-ONLY SCENE VIEWER (window.SceneViewer)
   A second, independent Leaflet instance — completely separate from
   window.SceneApp's editor map — used to show the GM-published scene
   to non-GM stations (COMMANDER / TRANSFER / DISPATCH) plus live
   ambulance markers. No editing, no dragging, no marker placement,
   no edit popups.
   Mounted into the PERSISTENT #sceneViewerMap container (a sibling of
   #app, outside the innerHTML that render() rebuilds), so it survives
   the main app's frequent re-renders without being torn down/recreated
   every poll — mount() is only called once per station session; after
   that, setData()/setVehicles() update the existing map in place.
============================================================ */
window.SceneViewer = (function(){
  'use strict';

  const TENT_META = {
    incident:  {color:'#ef4444', emoji:'🔥'},
    primary:   {color:'#3b82f6', emoji:'⛺'},
    secondary: {color:'#8b5cf6', emoji:'⛺'},
    red:       {color:'#ef4444', emoji:'🔴'},
    yellow:    {color:'#facc15', emoji:'🟡'},
    green:     {color:'#22c55e', emoji:'🟢'},
    black:     {color:'#111827', emoji:'⚫'},
    loading:   {color:'#a855f7', emoji:'🚑'},
    parking:   {color:'#38bdf8', emoji:'🅿️'},
    hospital:  {color:'#16a34a', emoji:'🏥'},
    command:   {color:'#f59e0b', emoji:'🧭'},
    decon:     {color:'#06b6d4', emoji:'🚿'}
  };
  const ZONE_META = {
    hot:  {color:'#e5484d', fill:'#e5484d'},
    warm: {color:'#f0c020', fill:'#f0c020'},
    cold: {color:'#3fb56f', fill:'#3fb56f'}
  };
  const ROUTE_META = {
    entry:  {color:'#22c55e'},
    exit:   {color:'#3b82f6'},
    closed: {color:'#ef4444'},
    patient:{color:'#a855f7'}
  };

  let map=null, layers=null, mounted=false, lastDataSig=null;
  const vehicleMarkers = {};

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

  function tentIcon(typeId){
    const meta = TENT_META[typeId] || {color:'#6b7280', emoji:'📍'};
    const html = '<div style="background:'+meta.color+';width:28px;height:28px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #111827;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.4);">'
      +'<span style="transform:rotate(45deg);font-size:13px;">'+meta.emoji+'</span></div>';
    return L.divIcon({className:'sv-tent-icon', html:html, iconSize:[28,28], iconAnchor:[14,26]});
  }
  function vehicleIcon(label){
    const html = '<div style="background:#fff;border:2px solid #a855f7;border-radius:6px;padding:1px 6px;font-size:11px;font-weight:700;color:#111827;box-shadow:0 1px 4px rgba(0,0,0,.35);white-space:nowrap;">🚑 '+esc(label)+'</div>';
    return L.divIcon({className:'sv-vehicle-icon', html:html, iconSize:null, iconAnchor:[20,10]});
  }

  function clearSceneLayers(){
    if(!layers) return;
    layers.tents.clearLayers();
    layers.zones.clearLayers();
    layers.routes.clearLayers();
  }
  function drawScene(data){
    clearSceneLayers();
    if(!data) return;
    (data.tents||[]).forEach(function(t){
      if(t.lat==null || t.lng==null) return;
      const meta = TENT_META[t.typeId] || {};
      const marker = L.marker([t.lat,t.lng], {icon:tentIcon(t.typeId), interactive:true, keyboard:false});
      marker.bindTooltip(esc(t.name||meta.label||t.typeId), {direction:'top', offset:[0,-22]});
      marker.addTo(layers.tents);
    });
    (data.zones||[]).forEach(function(z){
      if(z.lat==null || z.lng==null) return;
      const meta = ZONE_META[z.typeId] || {color:'#888', fill:'#888'};
      L.circle([z.lat,z.lng], {radius:z.radius, color:meta.color, fillColor:meta.fill, fillOpacity:.15, weight:2, interactive:false}).addTo(layers.zones);
    });
    (data.routes||[]).forEach(function(r){
      const meta = ROUTE_META[r.typeId] || {color:'#94a3b8'};
      const pts = (r.points||[]).filter(function(p){ return p && p.lat!=null && p.lng!=null; }).map(function(p){ return [p.lat,p.lng]; });
      if(pts.length>1) L.polyline(pts, {color:meta.color, weight:4, dashArray: r.typeId==='closed'?'6 6':null, interactive:false}).addTo(layers.routes);
    });
  }

  function mount(opts){
    if(mounted) destroy();
    const container = opts && opts.container;
    if(!container || typeof L==='undefined') return;
    map = L.map(container, {zoomControl:false, attributionControl:false}).setView([18.286464,99.506049],15);
    L.control.zoom({position:'bottomright'}).addTo(map);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19, attribution:'&copy; OpenStreetMap contributors'}).addTo(map);
    layers = {tents:L.layerGroup().addTo(map), zones:L.layerGroup().addTo(map), routes:L.layerGroup().addTo(map), vehicles:L.layerGroup().addTo(map)};
    mounted = true;
    lastDataSig = null;
    const data = opts.data;
    if(data){
      drawScene(data);
      lastDataSig = JSON.stringify({tents:data.tents, zones:data.zones, routes:data.routes});
      if(data.center) map.setView([data.center.lat, data.center.lng], data.zoom||13);
    }
    setTimeout(function(){ if(map) map.invalidateSize(); }, 60);
  }

  /* Cheap no-op guard: only redraws tents/zones/routes when the published
     scene actually changed, so calling this on every ~1s render tick (to
     keep vehicles live) doesn't also thrash the static layers. */
  function setData(data){
    if(!mounted || !map || !data) return;
    const sig = JSON.stringify({tents:data.tents, zones:data.zones, routes:data.routes});
    if(sig===lastDataSig) return;
    lastDataSig = sig;
    drawScene(data);
  }

  function pointAtFraction(points, frac){
    if(!points || !points.length) return null;
    if(points.length===1) return L.latLng(points[0].lat, points[0].lng);
    const latlngs = points.map(function(p){ return L.latLng(p.lat,p.lng); });
    const segLens=[]; let total=0;
    for(let i=1;i<latlngs.length;i++){ const d=latlngs[i-1].distanceTo(latlngs[i]); segLens.push(d); total+=d; }
    if(total===0) return latlngs[0];
    let target = Math.max(0,Math.min(1,frac))*total;
    for(let i=0;i<segLens.length;i++){
      if(target<=segLens[i] || i===segLens.length-1){
        const t = segLens[i]>0 ? Math.min(1,target/segLens[i]) : 0;
        const a=latlngs[i], b=latlngs[i+1];
        return L.latLng(a.lat+(b.lat-a.lat)*t, a.lng+(b.lng-a.lng)*t);
      }
      target -= segLens[i];
    }
    return latlngs[latlngs.length-1];
  }

  /* vehicles: STATE.vehicles array. elapsed: elapsedMinutes(gc) from the
     caller (kept as a plain number so this module has no dependency on
     the main app's globals). Draws one marker per vehicle currently BUSY
     with a dispatched trip (busyStartElapsed/outboundPath present),
     interpolated along the real outbound/return polyline. */
  function setVehicles(vehicles, elapsed){
    if(!mounted || !map || !layers) return;
    const active = {};
    (vehicles||[]).forEach(function(v){
      const hasTrip = v && v.busyStartElapsed!=null && v.outboundPath && v.outboundPath.length && v.busyUntilElapsed!=null;
      if(!hasTrip || !(elapsed < v.busyUntilElapsed) || !(elapsed >= v.busyStartElapsed)) return;
      const t = elapsed - v.busyStartElapsed;
      const outMin = Number(v.outboundMin)||0, retMin = Number(v.returnMin)||0;
      let frac, path;
      if(t <= outMin){
        frac = outMin>0 ? t/outMin : 1;
        path = v.outboundPath;
      } else {
        frac = retMin>0 ? (t-outMin)/retMin : 1;
        path = (v.returnPath && v.returnPath.length) ? v.returnPath : v.outboundPath.slice().reverse();
      }
      frac = Math.max(0, Math.min(1, frac));
      const pos = pointAtFraction(path, frac);
      if(!pos) return;
      active[v.name]=true;
      if(vehicleMarkers[v.name]) vehicleMarkers[v.name].setLatLng(pos);
      else vehicleMarkers[v.name] = L.marker(pos, {icon:vehicleIcon(v.name), interactive:false, keyboard:false}).addTo(layers.vehicles);
    });
    Object.keys(vehicleMarkers).forEach(function(name){
      if(!active[name]){ layers.vehicles.removeLayer(vehicleMarkers[name]); delete vehicleMarkers[name]; }
    });
  }

  function destroy(){
    if(!map) return;
    try{ map.remove(); }catch(e){}
    map=null; layers=null; mounted=false; lastDataSig=null;
    Object.keys(vehicleMarkers).forEach(function(k){ delete vehicleMarkers[k]; });
  }

  return {mount:mount, destroy:destroy, setData:setData, setVehicles:setVehicles};
})();
</script>

async function kvGet(key, fallback){
  if(!fbReady) return fallback;
  try{
    const snap = await fbDb.ref(DB_ROOT+'/'+key).once('value');
    if(!snap.exists()) return fallback;
    const raw = snap.val();
    return typeof raw==='string' ? JSON.parse(raw) : raw;
  }catch(e){
    console.error('kvGet failed', key, e);
    STATE.fbConnected = false; STATE.fbErrorMsg = (e && e.message) || String(e);
    return fallback;
  }
}
async function kvSet(key, val){

  }catch(e){
    console.error('kvSet failed', key, e);
    STATE.fbConnected = false; STATE.fbErrorMsg = (e && e.message) || String(e);
    return false;
  }
}
async function kvUpdate(key, fallback, mutator){

}
async function kvRootTransaction(mutator){
  if(!fbReady) return {committed:false};
  try{
    const ref = fbDb.ref(DB_ROOT);
    // Firebase's transaction() gives your update function whatever it has
    // *locally cached* for this exact path. Since the rest of the app only
    // ever reads individual child paths (DB_ROOT/patients, DB_ROOT/resources,
    // ...), the SDK may never have cached the ROOT path itself — so the very
    // first transaction on it can be handed `null` even though real data
    // exists on the server, causing false "ไม่พบผู้ป่วย"/etc. aborts.
    // Force a fresh read of the exact same path first so the transaction's
    // update function always starts from real data.
    const initialSnap = await ref.once('value');
    const initialRoot = initialSnap.val();
    const result = await ref.transaction(function(root){
      // The compat SDK can still invoke a transaction's first local pass with
      // null even immediately after once('value').  Falling back to {} here
      // made the mutator see patients=[] and abort with a false
      // "ไม่พบผู้ป่วย".  Seed that first pass with the freshly-read snapshot;
      // if another client has changed the root, Firebase detects the conflict
      // and invokes this function again with the newest server value.
      if(root==null) root = initialRoot;
      root = root || {};
      const decoded = {};
      Object.keys(root).forEach(function(k){
        const v=root[k];
        try{ decoded[k]=typeof v==='string'?JSON.parse(v):v; }catch(e){ decoded[k]=v; }
      });
      const next = mutator(decoded);
      if(next==null) return;
      const encoded = {};
      Object.keys(next).forEach(function(k){ encoded[k]=JSON.stringify(next[k]); });
      return encoded;
    });
    STATE.fbConnected=true;
    return {committed:result.committed, snapshot:result.snapshot};
  }catch(e){
    console.error('kvRootTransaction failed',e);
    STATE.fbConnected=false; STATE.fbErrorMsg=(e&&e.message)||String(e);
    return {committed:false,error:e};
  }
}
