<html lang="th">

<title>MCI Command — Mass Casualty Incident Simulation</title>

<style>
:root{
  --bg:#0B0F14;
  --bg-panel:#121821;
  --bg-panel-2:#1A222D;
  --line:#26313F;
  --line-soft:#1D2732;
  --ink:#E7EDF3;
  --ink-dim:#8FA1B3;
  --ink-faint:#5E6E7E;
  --accent:#2FD3C7;
  --accent-dim:#1B7A73;
  --red:#E5484D;
  --red-dim:#3A1719;
  --yellow:#F3A712;
  --yellow-dim:#3A2C0C;
  --green:#3FBF6F;
  --green-dim:#12301E;
  --black-tri:#9BA3AE;
  --black-dim:#22262B;
  --font-display:'Space Grotesk', sans-serif;
  --font-body:'IBM Plex Sans Thai','IBM Plex Sans',sans-serif;
  --font-mono:'IBM Plex Mono', monospace;
  --radius:10px;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:
    radial-gradient(ellipse 900px 500px at 15% -10%, rgba(47,211,199,.07), transparent 60%),
    radial-gradient(ellipse 700px 500px at 100% 0%, rgba(229,72,77,.05), transparent 55%),
    var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--accent-dim);color:#fff;}
button{font-family:inherit;}
input,select,textarea{font-family:inherit;}

/* ---------- scaffold ---------- */
#app{min-height:100vh;display:flex;flex-direction:column;}

.topbar{
  display:flex;align-items:center;gap:14px;
  padding:10px 18px;
  background:linear-gradient(180deg, var(--bg-panel), rgba(18,24,33,.85));
  border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:40;
  backdrop-filter:blur(6px);
}
.brand{
  font-family:var(--font-display);
  font-weight:700;
  font-size:15px;
  letter-spacing:.02em;
  color:var(--ink);
  display:flex;align-items:center;gap:8px;
  white-space:nowrap;
}
.brand .dot{
  width:9px;height:9px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 0 3px rgba(47,211,199,.15);
}
.clockwrap{
  display:flex;align-items:center;gap:10px;
  font-family:var(--font-mono);
  margin-left:auto;
  flex-wrap:wrap;
  justify-content:flex-end;
}
.pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 10px;border-radius:999px;
  border:1px solid var(--line);
  background:var(--bg-panel-2);
  font-size:12px;color:var(--ink-dim);
  white-space:nowrap;
}
.pill b{color:var(--ink);font-weight:600;}
.pill.status-RUNNING{border-color:var(--accent-dim);color:var(--accent);}
.pill.status-ENDED{border-color:#4a2b2b;color:var(--red);}
.pill.status-NOT_STARTED{border-color:var(--line);color:var(--ink-faint);}
.timerbig{
  font-family:var(--font-mono);
  font-size:22px;font-weight:600;
  color:var(--ink);
  letter-spacing:.03em;
  padding:2px 4px;
  position:relative;
}
.sweepbar{
  height:2px;width:100%;
  background:linear-gradient(90deg, transparent, var(--accent), transparent);
  background-size:200% 100%;
  animation:sweep 2.6s linear infinite;
  opacity:.7;
}
@keyframes sweep{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

.mebadge{
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--ink-dim);
}
.mebadge b{color:var(--ink);}
.switchbtn{
  background:none;border:1px solid var(--line);color:var(--ink-dim);
  border-radius:7px;padding:4px 9px;font-size:11px;cursor:pointer;
}
.switchbtn:hover{border-color:var(--accent-dim);color:var(--accent);}

.main{
  flex:1;
  width:100%;
  max-width:1360px;
  margin:0 auto;
  padding:20px 18px 60px;
}

/* ---------- generic components ---------- */
.card{
  background:var(--bg-panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px;
}
.card + .card{margin-top:14px;}
.grid{display:grid;gap:14px;}
.grid.cols-2{grid-template-columns:repeat(2,1fr);}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
@media (max-width:900px){
  .grid.cols-2,.grid.cols-3,.grid.cols-4{grid-template-columns:1fr;}
}

h1,h2,h3,h4{font-family:var(--font-display);margin:0 0 10px;color:var(--ink);}
h1{font-size:26px;font-weight:700;}
h2{font-size:18px;font-weight:600;}
h3{font-size:14px;font-weight:600;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.06em;}
p{color:var(--ink-dim);line-height:1.55;margin:0 0 10px;}

.label{font-size:12px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;display:block;}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  background:var(--bg-panel-2);
  border:1px solid var(--line);
  color:var(--ink);
  padding:9px 16px;
  border-radius:8px;
  font-size:13px;font-weight:600;
  cursor:pointer;
  transition:border-color .15s, background .15s, transform .05s;
}
.btn:hover{border-color:var(--accent-dim);}
.btn:active{transform:scale(.97);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#04211E;}
.btn.primary:hover{background:#3EE6D9;}
.btn.danger{background:var(--red);border-color:var(--red);color:#2B0708;}
.btn.danger:hover{background:#ff5b60;}
.btn.ghost{background:transparent;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn.block{width:100%;}
.btn.sm{padding:6px 10px;font-size:12px;border-radius:6px;}

input[type=text],input[type=number],select,textarea{
  width:100%;
  background:var(--bg);
  border:1px solid var(--line);
  color:var(--ink);
  padding:9px 11px;
  border-radius:7px;
  font-size:13.5px;
  outline:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(47,211,199,.12);}
select{cursor:pointer;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{
  text-align:left;font-size:11px;color:var(--ink-faint);
  text-transform:uppercase;letter-spacing:.05em;font-weight:600;
  padding:8px 10px;border-bottom:1px solid var(--line);
  white-space:nowrap;
}
td{padding:9px 10px;border-bottom:1px solid var(--line-soft);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr.row-hover:hover td{background:rgba(255,255,255,.02);}

.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:999px;
  font-size:11px;font-weight:600;letter-spacing:.02em;
  border:1px solid transparent;
  white-space:nowrap;
}
.badge.RED{background:var(--red-dim);color:var(--red);border-color:#5a2427;}
.badge.YELLOW{background:var(--yellow-dim);color:var(--yellow);border-color:#5a4413;}
.badge.GREEN{background:var(--green-dim);color:var(--green);border-color:#1f5c39;}
.badge.BLACK{background:var(--black-dim);color:var(--black-tri);border-color:#3a3f46;}
.badge.ok{background:var(--green-dim);color:var(--green);}
.badge.bad{background:var(--red-dim);color:var(--red);}
.badge.wait{background:var(--yellow-dim);color:var(--yellow);}
.badge.neutral{background:var(--bg-panel-2);color:var(--ink-dim);border-color:var(--line);}
.badge.dead{background:#000;color:var(--red);border-color:var(--red);}

.pulse-dot{
  width:7px;height:7px;border-radius:50%;background:var(--yellow);
  animation:pulse 1.2s ease-in-out infinite;display:inline-block;
}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(243,167,18,.5);}50%{opacity:.5;box-shadow:0 0 0 4px rgba(243,167,18,0);}}

.stripe-RED{border-left:3px solid var(--red);}
.stripe-YELLOW{border-left:3px solid var(--yellow);}
.stripe-GREEN{border-left:3px solid var(--green);}
.stripe-BLACK{border-left:3px solid var(--black-tri);}

.patient-card{
  background:var(--bg-panel-2);
  border:1px solid var(--line);
  border-radius:9px;
  padding:13px 14px;
  margin-bottom:10px;
}
.patient-card .pidrow{
  display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;
}
.pid{font-family:var(--font-mono);font-size:17px;font-weight:600;color:var(--ink);}
.subrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px;}

.empty{
  text-align:center;padding:40px 20px;color:var(--ink-faint);
  border:1px dashed var(--line);border-radius:10px;
}
.empty .big{font-size:32px;margin-bottom:8px;}

.toastwrap{
  position:fixed;bottom:18px;right:18px;z-index:100;
  display:flex;flex-direction:column;gap:8px;
  max-width:360px;
}
.toast{
  background:var(--bg-panel-2);border:1px solid var(--line);
  border-left:3px solid var(--accent);
  padding:10px 14px;border-radius:8px;font-size:13px;color:var(--ink);
  box-shadow:0 8px 24px rgba(0,0,0,.35);
  animation:toastin .2s ease;
}
.toast.err{border-left-color:var(--red);}
.toast.ok{border-left-color:var(--green);}
@keyframes toastin{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.tab{
  padding:8px 14px;border-radius:8px;border:1px solid var(--line);
  background:var(--bg-panel);color:var(--ink-dim);font-size:13px;font-weight:600;
  cursor:pointer;
}
.tab.active{background:var(--accent);color:#04211E;border-color:var(--accent);}

.station-hero{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;flex-wrap:wrap;gap:10px;
}
.station-hero .titlewrap .eyebrow{
  font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;
}
.capbar{
  display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:12px;color:var(--ink-dim);
}
.capbar .capfill{width:70px;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;border:1px solid var(--line);}
.capbar .capfill i{display:block;height:100%;background:var(--accent);}

/* join screen */
.joinwrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.joincard{
  width:100%;max-width:420px;
  background:var(--bg-panel);border:1px solid var(--line);border-radius:14px;
  padding:32px 28px;
  position:relative;
  overflow:hidden;
}
.joincard::before{
  content:'';position:absolute;top:-40%;left:-20%;width:180%;height:180%;
  background:radial-gradient(circle at 30% 20%, rgba(47,211,199,.08), transparent 55%);
  pointer-events:none;
}
.jc-title{font-family:var(--font-display);font-size:22px;font-weight:700;margin-bottom:4px;}
.jc-sub{color:var(--ink-faint);font-size:13px;margin-bottom:22px;}

.waitwrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;
  padding:20px;text-align:center;
}
.spinner{
  width:36px;height:36px;border-radius:50%;
  border:3px solid var(--line);border-top-color:var(--accent);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.kv{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line-soft);font-size:13px;}
.kv:last-child{border-bottom:none;}
.kv .k{color:var(--ink-faint);}
.kv .v{color:var(--ink);font-family:var(--font-mono);font-weight:600;}

.roster-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-soft);flex-wrap:wrap;}
.roster-row:last-child{border-bottom:none;}
.roster-name{font-weight:600;min-width:120px;}
.dotlive{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
.dotstale{width:7px;height:7px;border-radius:50%;background:var(--ink-faint);flex-shrink:0;}

.hint{font-size:12px;color:var(--ink-faint);margin-top:4px;}
.section-gap{margin-top:24px;}
.flexrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.flex1{flex:1;min-width:120px;}
</style>
</head>

/* ============================================================
   2) STORAGE LAYER (Firebase Realtime Database — works from any
      browser over the internet, no Claude account needed)
============================================================ */
const DB_ROOT = 'mci_sim_v1';
const KEYS = {
  gc:'gc', cases:'cases', resources:'resources', hospitals:'hospitals',
  vehicles:'vehicles', patients:'patients', roster:'roster', seed:'seeded'
};
let fbReady = false;
let fbDb = null;

function fbInit(){
  try{
    if(!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey.indexOf('PASTE_')===0){
      fbReady = false;
      return;
    }
    const app = firebase.initializeApp(FIREBASE_CONFIG);
    fbDb = firebase.database();
    fbReady = true;
  }catch(e){
    console.error('Firebase init failed', e);
    fbReady = false;
  }
}

async function kvGet(key, fallback){
  if(!fbReady) return fallback;
  try{
    const snap = await fbDb.ref(DB_ROOT+'/'+key).once('value');
    if(!snap.exists()) return fallback;
    const raw = snap.val();
    return typeof raw==='string' ? JSON.parse(raw) : raw;
  }catch(e){
    console.error('kvGet failed', key, e);
    STATE.fbConnected = false; STATE.fbErrorMsg = (e && e.message) || String(e);
    return fallback;
  }
}
async function kvSet(key, val){
  if(!fbReady) return false;
  try{
    await fbDb.ref(DB_ROOT+'/'+key).set(JSON.stringify(val));
    STATE.fbConnected = true;
    return true;
  }catch(e){
    console.error('kvSet failed', key, e);
    STATE.fbConnected = false; STATE.fbErrorMsg = (e && e.message) || String(e);
    return false;
  }
}
async function kvUpdate(key, fallback, mutator){
  const cur = await kvGet(key, fallback);
  const next = mutator(cur);
  await kvSet(key, next);
  return next;
}
async function kvRootTransaction(mutator){
  if(!fbReady) return {committed:false};
  try{
    const ref = fbDb.ref(DB_ROOT);
    // Firebase's transaction() gives your update function whatever it has
    // *locally cached* for this exact path. Since the rest of the app only
    // ever reads individual child paths (DB_ROOT/patients, DB_ROOT/resources,
    // ...), the SDK may never have cached the ROOT path itself — so the very
    // first transaction on it can be handed `null` even though real data
    // exists on the server, causing false "ไม่พบผู้ป่วย"/etc. aborts.
    // Force a fresh read of the exact same path first so the transaction's
    // update function always starts from real data.
    await ref.once('value');
    const result = await ref.transaction(function(root){
      root = root || {};
      const decoded = {};
      Object.keys(root).forEach(function(k){
        const v=root[k];
        try{ decoded[k]=typeof v==='string'?JSON.parse(v):v; }catch(e){ decoded[k]=v; }
      });
      const next = mutator(decoded);
      if(next==null) return;
      const encoded = {};
      Object.keys(next).forEach(function(k){ encoded[k]=JSON.stringify(next[k]); });
      return encoded;
    });
    STATE.fbConnected=true;
    return {committed:result.committed, snapshot:result.snapshot};
  }catch(e){
    console.error('kvRootTransaction failed',e);
    STATE.fbConnected=false; STATE.fbErrorMsg=(e&&e.message)||String(e);
    return {committed:false,error:e};
  }
}
async function fbSelfTest(){
  if(!fbReady) return;
  try{
    await fbDb.ref(DB_ROOT+'/_selftest').set(Date.now());
    STATE.fbConnected = true;
  }catch(e){
    STATE.fbConnected = false;
    STATE.fbErrorMsg = (e && e.message) || String(e);
  }
  render(true);
}

/* ============================================================
   3) PURE GAME LOGIC
============================================================ */
function norm(v){ return String(v==null?'':v).trim(); }
function normU(v){ return norm(v).toUpperCase(); }
function round1(n){ return Math.round(Number(n)*10)/10; }
function uniq(arr){ return arr.filter(function(x,i){ return arr.indexOf(x)===i; }); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

function findCase(cases, id){
  const target = normU(id);
  for(let i=0;i<cases.length;i++){ if(String(cases[i].id).toUpperCase()===target) return cases[i]; }
  return null;
}

function elapsedMinutes(gc){
  if(!gc || gc.status==='NOT_STARTED') return 0;
  if(gc.status==='ENDED') return gc.endedElapsed || 0;
  if(!gc.startTime) return 0;
  return (Date.now()-gc.startTime)/60000;
}

function txSlotStatus(slot, elapsed){
  if(!slot) return null;
  const doneAt = slot.startedAt + slot.durationSec/60;
  return elapsed < doneAt ? 'IN_PROGRESS' : 'SUCCESS';
}
function patientTxStatuses(p, elapsed){
  return p.tx.map(function(s){ return txSlotStatus(s, elapsed); });
}
function hasAnyTxInProgress(p, elapsed){
  return patientTxStatuses(p, elapsed).indexOf('IN_PROGRESS') > -1;
}
function requiredTxComplete(p, caseObj, elapsed){
  const required = (caseObj && caseObj.reqTx) || [];
  if(!required.length) return true;
  const successful = {};
  (p.tx||[]).forEach(function(slot){
    if(slot && txSlotStatus(slot, elapsed)==='SUCCESS') successful[slot.item]=true;
  });
  return required.every(function(r){ return successful[r]; });
}
function computeTxStatus(p, caseObj, elapsed){
  if(!caseObj) return 'UNKNOWN';
  const limit = Number(caseObj.timeLimit)||999;
  const required = caseObj.reqTx||[];
  const requiredSlots = required.map(function(item){
    return (p.tx||[]).find(function(slot){ return slot && slot.item===item; });
  });
  const allAssigned = requiredSlots.every(Boolean);
  const allFinished = allAssigned && requiredSlots.every(function(slot){ return txSlotStatus(slot,elapsed)==='SUCCESS'; });
  const allFinishedInTime = allFinished && requiredSlots.every(function(slot){
    return (slot.startedAt + slot.durationSec/60) <= limit;
  });
  if(required.length===0) return 'STABILIZED';
  if(allFinishedInTime) return 'STABILIZED';
  if(elapsed>limit) return 'DEAD';
  if(hasAnyTxInProgress(p,elapsed)) return 'IN_PROGRESS';
  return 'UNASSESSED';
}
function patientIsDead(p, elapsed){
  return computeTxStatus(p, findCase(STATE.cases,p.id), elapsed)==='DEAD';
}
function deathReasonFor(p, elapsed){
  const c=findCase(STATE.cases,p.id);
  if(!c) return 'ไม่พบข้อมูลโจทย์';
  const missing=(c.reqTx||[]).filter(function(item){
    const slot=(p.tx||[]).find(function(x){return x&&x.item===item;});
    return !slot || (slot.startedAt+slot.durationSec/60)>Number(c.timeLimit);
  });
  return missing.length ? 'รักษาไม่ครบ/ไม่ทันเวลา: '+missing.join(', ') : 'เกินเวลาที่กำหนด';
}
function effectiveCanWalk(p){
  const c=findCase(STATE.cases,p.id);
  return c ? c.canWalk : p.canWalk;
}
function canStartSequential(p, slotIndex, elapsed){
  if(slotIndex===0) return true;
  const prev = p.tx[slotIndex-1];
  if(!prev) return false;
  return txSlotStatus(prev, elapsed)==='SUCCESS';
}
function countZoneInProgress(patients, zone, elapsed){
  return patients.filter(function(p){ return p.stage==='TX' && p.txZone===zone && hasAnyTxInProgress(p, elapsed); }).length;
}
function treatmentStaffCount(zone){
  const station = 'TX_'+zone;
  return Object.keys(STATE.roster||{}).filter(function(name){ return STATE.roster[name] && STATE.roster[name].station===station; }).length;
}
function availableVehicles(elapsed){
  return STATE.vehicles.filter(function(v){ return vehicleEffectiveStatus(v, elapsed)==='AVAILABLE'; });
}
function vehicleType(name){ return normU(String(name).split('_')[0]); }
function vehicleEffectiveStatus(v, elapsed){
  return (v.busyUntilElapsed && elapsed < v.busyUntilElapsed) ? 'BUSY' : 'AVAILABLE';
}
function calcVehicleLoad(type, total, sitting, lying, hospitalCount){
  if(hospitalCount>1) return {ok:false,label:'ปลายทางไม่ตรงกัน (Mixed hospital)'};
  if(!total) return {ok:true,label:'ว่าง'};
  type = normU(type);
  if(type==='BUS'){
    if(lying>0) return {ok:false,label:'BUS รับผู้ป่วยนอนไม่ได้'};
    if(sitting>10) return {ok:false,label:'เกิน 10 ที่นั่ง'};
    return {ok:true,label:'พร้อมส่ง'};
  }
  if(type==='ALS'||type==='BLS'){
    if(lying>1) return {ok:false,label:'นอนได้ไม่เกิน 1 คน'};
    if(lying===1 && total>1) return {ok:false,label:'มีผู้ป่วยนอน รถเต็มคันแล้ว'};
    if(lying===0 && sitting>2) return {ok:false,label:'นั่งได้ไม่เกิน 2 คน'};
    return {ok:true,label:'พร้อมส่ง'};
  }
  return {ok:true,label:'พร้อมส่ง'};
}
function vehicleCapacityNote(type){
  type = normU(type);
  if(type==='BUS') return 'นั่งได้สูงสุด 10 / รับผู้ป่วยนอนไม่ได้';
  if(type==='ALS'||type==='BLS') return 'นอนได้ 1 คน หรือ นั่งได้ 2 คน';
  return '';
}
function maxOrder(patients, field){
  return patients.reduce(function(m,p){ return Math.max(m, p[field]||0); }, 0);
}
function fmtMin(n){
  if(n==null) return '—';
  return round1(n)+' น.';
}
function timeAgo(ts){
  if(!ts) return '—';
  const s = Math.floor((Date.now()-ts)/1000);
  if(s<60) return s+'s ago';
  return Math.floor(s/60)+'m ago';
}

/* ============================================================
   5) SYNC / POLLING
============================================================ */
async function ensureSeeded(){
  const seeded = await kvGet(KEYS.seed, false);
  if(seeded) return;
  await kvSet(KEYS.cases, DEFAULT_CASES);
  await kvSet(KEYS.resources, DEFAULT_RESOURCES);
  await kvSet(KEYS.hospitals, DEFAULT_HOSPITALS);
  await kvSet(KEYS.vehicles, DEFAULT_VEHICLES);
  await kvSet(KEYS.gc, DEFAULT_GC);
  await kvSet(KEYS.patients, []);
  await kvSet(KEYS.roster, {});
  await kvSet(KEYS.seed, true);
}

async function refreshAll(){
  const results = await Promise.all([
    kvGet(KEYS.gc, DEFAULT_GC),
    kvGet(KEYS.cases, DEFAULT_CASES),
    kvGet(KEYS.resources, DEFAULT_RESOURCES),
    kvGet(KEYS.hospitals, DEFAULT_HOSPITALS),
    kvGet(KEYS.vehicles, DEFAULT_VEHICLES),
    kvGet(KEYS.patients, []),
    kvGet(KEYS.roster, {})
  ]);
  let gc=results[0], cases=results[1], resources=results[2], hospitals=results[3],
      vehicles=results[4], patients=results[5], roster=results[6];

  if(gc.status==='RUNNING' && gc.maxGameMin>0){
    const elapsed = elapsedMinutes(gc);
    if(elapsed>=gc.maxGameMin){
      gc = Object.assign({}, gc, {status:'ENDED', endedElapsed:gc.maxGameMin});
      kvSet(KEYS.gc, gc);
    }
  }

  STATE.gc=gc; STATE.cases=cases; STATE.resources=resources; STATE.hospitals=hospitals;
  STATE.vehicles=vehicles; STATE.patients=patients; STATE.roster=roster;

  if(STATE.me.name){
    const entry = roster[STATE.me.name];
    STATE.me.station = entry ? entry.station : null;
  }
  STATE.ready = true;
  backgroundRender();
}

/* Background refreshes (polling / clock tick) must never yank focus away
   from a <select> or text input the user is actively using — that's what
   caused the "flickers, can't pick treatment/vehicle" bug. Foreground
   renders triggered directly by the user's own click/change always run
   in full via render()/render(true) as before. */
function backgroundRender(){
  const ae = document.activeElement;
  const interacting = ae && (ae.tagName==='SELECT' || ae.tagName==='TEXTAREA' ||
    (ae.tagName==='INPUT' && (ae.type==='text' || ae.type==='number')));
  if(interacting){
    updateLiveTimersOnly();
    return;
  }
  render(true);
}
function updateLiveTimersOnly(){
  const el = document.getElementById('liveTimer');
  if(el) el.textContent = STATE.gc.status==='NOT_STARTED' ? '--:--' : fmtClock(elapsedMinutes(STATE.gc));
}

let pollTimer=null;
function startPolling(){
  if(pollTimer) return;
  refreshAll();
  pollTimer = setInterval(refreshAll, 2500);
  setInterval(function(){
    if(!STATE.me.name) return;
    kvUpdate(KEYS.roster, {}, function(roster){
      const cur = roster[STATE.me.name] || {station:null};
      const next = Object.assign({}, roster);
      next[STATE.me.name] = Object.assign({}, cur, {lastSeen:Date.now()});
      return next;
    });
  }, 6000);
  setInterval(function(){
    // keep clock/timer UI ticking smoothly even between polls, without
    // disrupting an in-progress dropdown/input selection
    if(STATE.gc.status==='RUNNING') backgroundRender();
  }, 1000);
}

async function joinAsPlayer(name, asGM, asCommander){
  name = name.trim();
  if(!name) { toast('กรุณากรอกชื่อ','err'); return; }
  await ensureSeeded();
  STATE.me.name = name;
  await kvUpdate(KEYS.roster, {}, function(roster){
    const cur = roster[name];
    const next = Object.assign({}, roster);
    next[name] = {station: asGM ? 'GM' : (asCommander ? 'COMMANDER' : (cur ? cur.station : null)), lastSeen:Date.now()};
    return next;
  });
  startPolling();
}
async function gmAssignStation(name, stationId){
  await kvUpdate(KEYS.roster, {}, function(roster){
    const cur = roster[name] || {lastSeen:Date.now()};
    const next = Object.assign({}, roster);
    next[name] = Object.assign({}, cur, {station: stationId || null});
    return next;
  });
  const roster = await kvGet(KEYS.roster, {});
  STATE.roster = roster;
  if(STATE.me.name===name) STATE.me.station = stationId||null;
  toast('อัปเดตหน้าที่ของ '+name, 'ok');
  render();
}
async function gmRemovePlayer(name){
  await kvUpdate(KEYS.roster, {}, function(roster){
    const next = Object.assign({}, roster);
    delete next[name];
    return next;
  });
  STATE.roster = await kvGet(KEYS.roster, {});
  render();
}

async function gmAddVehicle(name, type){

async function gmRemoveVehicle(name){

}

async function primaryRegister(idRaw){
  const id = normU(idRaw);
  if(!id){ toast('กรอก Patient_ID ก่อน','err'); return; }
  const caseObj = findCase(STATE.cases, id);
  if(!caseObj){ toast('ไม่พบ Patient_ID นี้ใน Case pool: '+id,'err'); return; }
  const elapsed=elapsedMinutes(STATE.gc);
  await mutatePatients(function(patients){
    if(patients.some(function(p){ return normU(p.id)===normU(id); })){ toast('Patient_ID นี้ถูกใช้ไปแล้ว: '+id,'err'); return null; }
    const p = {
      id:id, stage:'PRIMARY', canWalk:caseObj.canWalk,
      primary:null, primaryTime:null, primaryOrder:null, primaryDest:null,
      secondary:null, secondaryTime:null, secondaryOrder:null, secondaryDest:null,
      txZone:null, tx:[null,null,null], txStartTime:null, txNote:'',
      dispo:null, transferOrder:null, vehicle:null, hospital:null,
      transferTime:null, transferStatus:null, closedReason:null,
      dischargeTime:null, createdAt:elapsed, events:[{t:elapsed,type:'REGISTERED',by:STATE.me.name||''}]
    };
    return patients.concat([p]);
  });
}
async function primarySetField(id, field, value){
  await mutatePatients(function(patients){
    return patients.map(function(p){ return normU(p.id)===normU(id) ? Object.assign({}, p, mkPatch(field,value)) : p; });
  });
}
function mkPatch(field,value){ const o={}; o[field]=value; return o; }

async function primarySend(id, dest){
  const elapsed = elapsedMinutes(STATE.gc);
  await mutatePatients(function(patients){
    const idx=patients.findIndex(function(p){return normU(p.id)===normU(id);}); if(idx<0)return null;
    const p=patients[idx];
    if(patientIsDead(p,elapsed)){ toast('ผู้ป่วยเสียชีวิตแล้วและต้องค้างที่ Primary Triage','err'); return null; }
    if(!p.primary){ toast('ต้องเลือก Primary Triage ก่อน','err'); return null; }
    const order=maxOrder(patients,'primaryOrder')+1;
    let next=Object.assign({},p,{primaryTime:elapsed,primaryOrder:order,primaryDest:dest,events:(p.events||[]).concat([{t:elapsed,type:'PRIMARY_'+dest,by:STATE.me.name||''}])});
    next=dest==='DISCHARGE'?Object.assign(next,{stage:'CLOSED',closedReason:'DISCHARGE_PRIMARY',dischargeTime:elapsed}):Object.assign(next,{stage:'SECONDARY'});
    const copy=patients.slice();copy[idx]=next;return copy;
  });
}

async function secondarySetField(id, field, value){
  await mutatePatients(function(patients){

    next=dest==='DISCHARGE'?Object.assign(next,{stage:'CLOSED',closedReason:'DISCHARGE_SECONDARY',dischargeTime:elapsed}):Object.assign(next,{stage:'TX',txZone:p.secondary});

async function reserveResourceItem(item){
  if(!fbReady) return {ok:false, reason:'ไม่สามารถเชื่อมต่อฐานข้อมูลได้'};
  try{
    const ref=fbDb.ref(DB_ROOT+'/'+KEYS.resources);
    let durationSec=5;
    let fail='';
    const result=await ref.transaction(function(raw){
      let list;
      try{ list=typeof raw==='string'?JSON.parse(raw):raw; }
      catch(e){ list=null; }
      if(!Array.isArray(list)){ fail='โหลดข้อมูลทรัพยากรไม่สำเร็จ'; return; }
      const ri=list.findIndex(function(r){return r.item===item;});
      if(ri<0){ fail='ไม่พบทรัพยากร '+item; return; }
      if(Number(list[ri].stock)<=0){ fail=item+' หมด กรุณาขอ GM เพิ่ม'; return; }
      durationSec=Number(list[ri].durationSec)||5;
      const next=list.slice();
      next[ri]=Object.assign({},list[ri],{stock:Number(list[ri].stock)-1});
      return JSON.stringify(next);
    });
    if(!result.committed) return {ok:false,reason:fail||'ไม่สามารถจองทรัพยากรได้'};
    const raw=result.snapshot.val();
    const list=typeof raw==='string'?JSON.parse(raw):raw;
    const resource=(list||[]).find(function(r){return r.item===item;});
    return {ok:true,durationSec:durationSec,stock:resource?Number(resource.stock):null};
  }catch(e){
    console.error('reserveResourceItem failed',e);
    return {ok:false,reason:(e&&e.message)||'เกิดข้อผิดพลาดในการจองทรัพยากร'};
  }
}

async function refundResourceItem(item){
  if(!fbReady) return;
  try{
    const ref=fbDb.ref(DB_ROOT+'/'+KEYS.resources);
    await ref.transaction(function(raw){
      let list;
      try{ list=typeof raw==='string'?JSON.parse(raw):raw; }
      catch(e){ return; }
      if(!Array.isArray(list)) return;
      const ri=list.findIndex(function(r){return r.item===item;});
      if(ri<0) return;
      const next=list.slice();
      next[ri]=Object.assign({},list[ri],{stock:Number(list[ri].stock||0)+1});
      return JSON.stringify(next);
    });
  }catch(e){ console.error('refundResourceItem failed',e); }
}

async function txStartItem(id, slotIndex, item){
  if(!item) return;
  id=normU(id);
  slotIndex=Number(slotIndex);
  const elapsed=elapsedMinutes(STATE.gc);

  // เวอร์ชันเรียบง่าย: ไม่ตรวจและไม่หัก stock
  // อ่าน/เขียน patients โดยตรงเหมือนเวอร์ชันที่ Treatment ใช้งานได้
  const patients=await kvGet(KEYS.patients,[]);
  const idx=patients.findIndex(function(p){return normU(p.id)===id;});
  if(idx<0){toast('ไม่พบผู้ป่วย #'+id,'err');return;}

  const p=patients[idx];
  const caseObj=findCase(STATE.cases,id);
  if(computeTxStatus(p,caseObj,elapsed)==='DEAD'){
    toast('ผู้ป่วยเสียชีวิตแล้วและต้องค้างใน Treatment','err');return;
  }
  if(!canStartSequential(p,slotIndex,elapsed)){
    toast('ต้องทำ Treatment ลำดับก่อนหน้าให้สำเร็จก่อน','err');return;
  }
  if(hasAnyTxInProgress(p,elapsed)){
    toast('มี Treatment กำลังดำเนินการอยู่','err');return;
  }

  const capacity=treatmentStaffCount(p.txZone);
  const inProgress=countZoneInProgress(patients,p.txZone,elapsed);
  if(capacity<=0||inProgress>=capacity){
    toast('ไม่มี Staff ว่างในโซน '+p.txZone+' ('+inProgress+'/'+capacity+')','err');return;
  }

  const resource=STATE.resources.find(function(r){return r.item===item;});
  const durationSec=resource ? (Number(resource.durationSec)||5) : 5;
  const tx=(p.tx||[null,null,null]).slice();
  tx[slotIndex]={item:item,startedAt:elapsed,durationSec:durationSec};

  patients[idx]=Object.assign({},p,{
    tx:tx,
    txStartTime:p.txStartTime==null?elapsed:p.txStartTime,
    events:(p.events||[]).concat([{t:elapsed,type:'TX_START '+item,by:STATE.me.name||''}])
  });

  const saved=await kvSet(KEYS.patients,patients);
  if(!saved){toast('บันทึก Treatment ไม่สำเร็จ','err');return;}

  STATE.patients=patients;
  toast('เริ่ม Treatment: '+item,'ok');
  render();
}

async function txSetDispo(id, dispo){
  const elapsed=elapsedMinutes(STATE.gc);
  await mutatePatients(function(patients){
    const idx=patients.findIndex(function(p){return normU(p.id)===normU(id);});if(idx<0)return null;
    const p=patients[idx], status=computeTxStatus(p,findCase(STATE.cases,id),elapsed);
    if(status==='DEAD'){toast('ผู้ป่วยเสียชีวิตแล้วและต้องค้างใน Treatment','err');return null;}
    if(hasAnyTxInProgress(p,elapsed)){toast('Treatment ยังไม่เสร็จ','err');return null;}
    // Deliberately NOT blocking on whether required tx were completed correctly/in
    // time — that must stay hidden from players. The real outcome (accepted vs.
    // dead-on-arrival) is decided later in dispatchSend() at hospital arrival.
    let next;
    if(dispo==='TRANSFER') next=Object.assign({},p,{dispo:'TRANSFER',transferOrder:maxOrder(patients,'transferOrder')+1,stage:'TRANSFER',events:(p.events||[]).concat([{t:elapsed,type:'TO_TRANSFER',by:STATE.me.name||''}])});
    else next=Object.assign({},p,{dispo:'DISCHARGE',stage:'CLOSED',closedReason:'DISCHARGE_TX',dischargeTime:elapsed,events:(p.events||[]).concat([{t:elapsed,type:'DISCHARGE_TX',by:STATE.me.name||''}])});
    const copy=patients.slice();copy[idx]=next;return copy;
  });
}

   13) DISPATCH ACTION
============================================================ */
async function dispatchSend(vehicleName){
  const elapsed = elapsedMinutes(STATE.gc);
  const vBefore = STATE.vehicles.find(function(v){ return v.name===vehicleName; });
  if(!vBefore) return;
  if(vehicleEffectiveStatus(vBefore, elapsed)!=='AVAILABLE'){ toast('รถยังไม่ว่าง','err'); return; }
  const assigned = STATE.patients.filter(function(p){ return p.stage==='TRANSFER' && p.vehicle===vehicleName; });
  if(!assigned.length){ toast('ไม่มีผู้ป่วยรอรถคันนี้','err'); return; }
  const hospitalsList = uniq(assigned.map(function(p){ return p.hospital; }).filter(Boolean));
  if(hospitalsList.length===0){ toast('ยังไม่ได้กำหนดโรงพยาบาลปลายทาง','err'); return; }
  if(hospitalsList.length>1){ toast('ผู้ป่วยบนรถปลายทางไม่ตรงกัน (Mixed hospital)','err'); return; }
  const hospital = hospitalsList[0];
  const type = vehicleType(vehicleName);
  const sitting = assigned.filter(function(p){ return effectiveCanWalk(p)==='yes'; }).length;
  const lying = assigned.filter(function(p){ return effectiveCanWalk(p)!=='yes'; }).length;
  const load = calcVehicleLoad(type, assigned.length, sitting, lying, hospitalsList.length);
  if(!load.ok){ toast('โหลดเกินกำหนด: '+load.label,'err'); return; }

  const patients = await kvGet(KEYS.patients, []);
  const casesNow = STATE.cases;
  let acceptedCount=0, deadCount=0;
  const acceptedIds = [];
  const hCapacity=STATE.hospitals.find(function(h){return h.name===hospital;});
  const projected={RED:Number(hCapacity&&hCapacity.redUsed||0),YELLOW:Number(hCapacity&&hCapacity.yellowUsed||0),GREEN:Number(hCapacity&&hCapacity.greenUsed||0)};
  const nextPatients = patients.map(function(p){
    if(!(p.stage==='TRANSFER' && p.vehicle===vehicleName && p.hospital===hospital)) return p;
    const caseObj = findCase(casesNow, p.id);
    const txComplete = requiredTxComplete(p, caseObj, elapsed);
    const requiredVehicle = caseObj ? caseObj.vehicle : null;
    const wrongVehicle = requiredVehicle && vehicleType(vehicleName)!==normU(requiredVehicle);
    let transferStatus, closedReason;
    if(!txComplete){ transferStatus='DEAD_TX_INCOMPLETE'; closedReason='DEAD_TX_INCOMPLETE'; deadCount++; }
    else if(wrongVehicle){ transferStatus='DEAD_WRONG_VEHICLE'; closedReason='DEAD_WRONG_VEHICLE'; deadCount++; }
    else { transferStatus='ACCEPTED'; closedReason='TRANSFER_ACCEPTED'; acceptedCount++; acceptedIds.push(p.id); }
    const color=p.secondary||'';
    let overCapacity=false;
    if(closedReason==='TRANSFER_ACCEPTED' && hCapacity && projected[color]!=null){
      projected[color]++;
      const cap=color==='RED'?hCapacity.redCap:color==='YELLOW'?hCapacity.yellowCap:hCapacity.greenCap;
      overCapacity=projected[color]>Number(cap||0);
    }
    return Object.assign({}, p, {transferStatus:transferStatus, closedReason:closedReason, stage:'CLOSED', transferTime:elapsed, overCapacity:overCapacity, events:(p.events||[]).concat([{t:elapsed,type:'DISPATCH '+vehicleName+' → '+hospital,by:STATE.me.name||''}])});
  });
  await kvSet(KEYS.patients, nextPatients);
  STATE.patients = nextPatients;

  if(acceptedCount>0){
    await kvUpdate(KEYS.hospitals, DEFAULT_HOSPITALS, function(hospList){
      return hospList.map(function(h){
        if(h.name!==hospital) return h;
        let addRed=0, addYellow=0, addGreen=0;
        nextPatients.forEach(function(p){
          if(acceptedIds.indexOf(p.id)>-1){
            if(p.secondary==='RED') addRed++;
            else if(p.secondary==='YELLOW') addYellow++;
            else if(p.secondary==='GREEN') addGreen++;
          }
        });
        return Object.assign({}, h, {redUsed:h.redUsed+addRed, yellowUsed:h.yellowUsed+addYellow, greenUsed:h.greenUsed+addGreen});
      });
    });
  }

  const hospObj = STATE.hospitals.find(function(h){ return h.name===hospital; });
  const distance = hospObj ? hospObj.distanceMin : 5;
  await kvUpdate(KEYS.vehicles, DEFAULT_VEHICLES, function(vs){
    return vs.map(function(v){ return v.name===vehicleName ? Object.assign({}, v, {busyUntilElapsed: elapsed+distance*2, busyHospital:hospital}) : v; });
  });

  STATE.vehicles = await kvGet(KEYS.vehicles, DEFAULT_VEHICLES);
  STATE.hospitals = await kvGet(KEYS.hospitals, DEFAULT_HOSPITALS);

  toast('ส่งรถ '+vehicleName+' → '+hospital+' | Accepted '+acceptedCount+' | Dead '+deadCount, acceptedCount>0?'ok':'err');
  render();
}

function render(force){
  const snap = JSON.stringify({gc:STATE.gc, cases:STATE.cases, resources:STATE.resources, hospitals:STATE.hospitals,
    vehicles:STATE.vehicles, patients:STATE.patients, roster:STATE.roster, me:STATE.me, gmTab:STATE.gmTab, toasts:STATE.toasts,
    fbConnected:STATE.fbConnected});
  if(!force && snap===STATE._snapshot) return;
  STATE._snapshot = snap;

  const active = document.activeElement;
  let preserved = null;
  if(active && active.matches && active.matches('[data-preserve]')){
    preserved = {id:active.id, value:active.value, selStart:active.selectionStart, selEnd:active.selectionEnd};
  }

  const app = document.getElementById('app');
  app.innerHTML = buildView();

  if(preserved){
    const el = document.getElementById(preserved.id);
    if(el){
      el.value = preserved.value;
      el.focus();
      try{ el.setSelectionRange(preserved.selStart, preserved.selEnd); }catch(e){}
    }
  }
}

function buildView(){
  if(!fbReady){

  const banner = STATE.fbConnected===false ? viewConnErrorBanner() : '';
  if(!STATE.me.name){

  }
  if(!STATE.ready){
    return banner + '<div class="waitwrap"><div class="spinner"></div><p>กำลังโหลด...</p></div>';
  }
  if(!STATE.me.station){
    return banner + viewWaiting();
  }
  return banner + viewShell(viewStationBody());
}

  const statusLabel = STATE.gc.status==='RUNNING' ? 'กำลังดำเนินการ' : STATE.gc.status==='ENDED' ? 'จบเกมแล้ว' : 'ยังไม่เริ่ม';
  return ''
  + '<div class="clockwrap">'
  +   '<span class="pill status-'+STATE.gc.status+'">● '+statusLabel+'</span>'
  +   '<span class="timerbig" id="liveTimer">'+ (STATE.gc.status==='NOT_STARTED' ? '--:--' : fmtClock(elapsed)) +'</span>'
  +   '<span class="pill">Max <b>'+STATE.gc.maxGameMin+'</b> น.</span>'
  + '</div>';
}
function fmtClock(elapsedMin){
  const totalSec = Math.max(0, Math.round(elapsedMin*60));
  const m = Math.floor(totalSec/60);
  const s = totalSec%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function viewStationBody(){
  const st = STATE.me.station;
  if(st==='GM') return viewGM();
  if(st==='COMMANDER') return viewCommander();
  if(st==='PRIMARY') return viewPrimary();
  if(st==='SECONDARY') return viewSecondary();
  if(st==='TX_RED') return viewTx('RED');
  if(st==='TX_YELLOW') return viewTx('YELLOW');
  if(st==='TX_GREEN') return viewTx('GREEN');
  if(st==='TRANSFER') return viewTransfer();
  if(st==='DISPATCH') return viewDispatch(false);
  if(st==='DISCHARGE') return viewDischargeLog();
  return '<div class="empty"><div class="big">🤷</div>ไม่รู้จักสถานีนี้</div>';
}

/* ============================================================
   16) SHARED UI HELPERS
============================================================ */
function triageBadge(color){
  if(!color) return '<span class="badge neutral">—</span>';
  return '<span class="badge '+color+'">'+color+'</span>';
}
function correctnessBadge(guess, answer){
  if(!guess) return '';
  return guess===answer ? '<span class="badge ok">✅ ถูกต้อง</span>' : '<span class="badge bad">❌ ไม่ถูกต้อง</span>';
}
function canWalkBadge(v){
  return v==='yes' ? '<span class="badge neutral">🚶 นั่งได้</span>' : '<span class="badge neutral">🛏️ นอน</span>';
}
function triageButtonsHtml(pid, field, current, act){
  return TRIAGE_COLORS.map(function(c){
    const activeCls = current===c ? ' active-'+c : '';
    const style = current===c
      ? 'background:var(--'+(c==='BLACK'?'black-tri':c.toLowerCase())+');color:#04211E;border-color:transparent;'
      : '';
    return '<button class="btn sm" style="'+style+'" data-act="'+act+'" data-pid="'+esc(pid)+'" data-field="'+field+'" data-value="'+c+'">'+c+'</button>';
  }).join('');
}
function canWalkButtonsHtml(pid, current, act){
  return ''
  + '<button class="btn sm'+(current==='yes'?' primary':'')+'" data-act="'+act+'" data-pid="'+esc(pid)+'" data-field="canWalk" data-value="yes">🚶 นั่งได้</button>'
  + '<button class="btn sm'+(current==='no'?' primary':'')+'" data-act="'+act+'" data-pid="'+esc(pid)+'" data-field="canWalk" data-value="no">🛏️ นอน</button>';
}
function closedReasonLabel(reason){
  const map = {
    DISCHARGE_PRIMARY:'Discharge จาก Primary',
    DISCHARGE_SECONDARY:'Discharge จาก Secondary',
    DISCHARGE_TX:'Discharge จาก Treatment',
    TRANSFER_ACCEPTED:'✅ Transfer สำเร็จ',
    DEAD_TX_INCOMPLETE:'💀 เสียชีวิต — Treatment ไม่ครบ',
    DEAD_WRONG_VEHICLE:'💀 เสียชีวิต — ใช้รถผิดประเภท'
  };
  return map[reason] || reason || '—';
}
function statusBadgeForTx(status){
  // Intentionally do NOT reveal "Stabilized" (correct/complete-in-time) to players —
  // that would leak the hidden answer key in real time. Only show neutral/in-progress
  // and terminal DEAD (an objective fact, needed so the team stops working the case).
  if(status==='IN_PROGRESS') return '<span class="badge wait"><span class="pulse-dot"></span> กำลังรักษา</span>';
  if(status==='DEAD') return '<span class="badge dead">💀 DEAD</span>';
  return '';
}

function txSlotSelectHtml(p, slotIndex, elapsed){
  const slot = p.tx[slotIndex];
  const canStart = canStartSequential(p, slotIndex, elapsed) && !hasAnyTxInProgress(p, elapsed);
  if(slot){
    const status = txSlotStatus(slot, elapsed);
    const remain = status==='IN_PROGRESS' ? Math.max(0, round1((slot.startedAt+slot.durationSec/60-elapsed)*60)) : 0;
    return '<div class="kv"><span class="k">Tx'+(slotIndex+1)+': '+esc(slot.item)+'</span><span class="v">'
      + (status==='IN_PROGRESS' ? '<span class="pulse-dot"></span> เหลือ '+remain+'s' : '✅ สำเร็จ')
      + '</span></div>';
  }
  if(!canStart){
    return '<div class="kv"><span class="k">Tx'+(slotIndex+1)+'</span><span class="v" style="color:var(--ink-faint);">รอลำดับก่อนหน้า</span></div>';
  }
  const options = ['<option value="">— เลือก Treatment —</option>'].concat(
    STATE.resources.map(function(r){ return '<option value="'+esc(r.item)+'">'+esc(r.item)+' — stock '+r.stock+'</option>'; })
  ).join('');
  return '<select data-act="txSelect" data-pid="'+esc(p.id)+'" data-slot="'+slotIndex+'">'+options+'</select>';
}

/* ============================================================
   21) DISPATCH / VEHICLE BOARD VIEW
============================================================ */
function viewDispatch(embedded){
  const elapsed = elapsedMinutes(STATE.gc);
  const rows = STATE.vehicles.map(function(v){
    const status = vehicleEffectiveStatus(v, elapsed);
    const assigned = STATE.patients.filter(function(p){ return p.stage==='TRANSFER' && p.vehicle===v.name; });
    const ids = assigned.map(function(p){ return '#'+p.id; }).join(', ') || '—';
    const hospitalsList = uniq(assigned.map(function(p){ return p.hospital; }).filter(Boolean));
    const hospitalLabel = hospitalsList.length===0 ? '—' : hospitalsList.length===1 ? hospitalsList[0] : 'MIXED';
    const sitting = assigned.filter(function(p){ return effectiveCanWalk(p)==='yes'; }).length;
    const lying = assigned.filter(function(p){ return effectiveCanWalk(p)!=='yes'; }).length;
    const load = calcVehicleLoad(v.type, assigned.length, sitting, lying, hospitalsList.length);
    const canSend = status==='AVAILABLE' && hospitalsList.length===1 && load.ok && assigned.length>0;
    const returnInfo = status==='BUSY' ? ('กลับใน '+round1(v.busyUntilElapsed-elapsed)+' น. ('+esc(v.busyHospital||'')+')') : '';
    return '<tr class="row-hover">'
      + '<td><b>'+esc(v.name)+'</b><div class="hint">'+vehicleCapacityNote(v.type)+'</div></td>'
      + '<td><span class="badge neutral">'+v.type+'</span></td>'
      + '<td>'+(status==='AVAILABLE' ? '<span class="badge ok">ว่าง</span>' : '<span class="badge wait">ไม่ว่าง</span>')+'<div class="hint">'+returnInfo+'</div></td>'
      + '<td style="font-family:var(--font-mono);font-size:12px;">'+ids+'</td>'
      + '<td>'+hospitalLabel+'</td>'
      + '<td>'+(load.ok ? '<span class="badge ok">'+load.label+'</span>' : '<span class="badge bad">'+load.label+'</span>')+'</td>'
      + '<td><button class="btn sm primary" data-act="dispatchSend" data-vehicle="'+esc(v.name)+'" '+(canSend?'':'disabled')+'>ส่งรถ (SEND)</button></td>'
      + '</tr>';
  }).join('');

  const table = '<div class="card"><table><thead><tr><th>Vehicle</th><th>Type</th><th>Status</th><th>ผู้ป่วยบนรถ</th><th>ปลายทาง</th><th>โหลด</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>';

  if(embedded) return table;
  return ''
  + '<div class="station-hero"><div class="titlewrap"><div class="eyebrow">STATION</div><h1>📡 Vehicle Dispatch</h1></div></div>'
  + table;
}

function viewDischargeLog(embedded){

    + (rows || '<tr><td colspan="6" style="text-align:center;color:var(--ink-faint);padding:20px;">ยังไม่มีผู้ป่วยในระบบ</td></tr>')

function avgMetric(values){
  const v=values.filter(function(x){return Number.isFinite(x)&&x>=0;});
  return v.length?round1(v.reduce(function(a,b){return a+b;},0)/v.length):'—';
}
function gmTabDebrief(){
  const elapsed=elapsedMinutes(STATE.gc), patients=STATE.patients;
  const primaryDone=patients.filter(function(p){return p.primary;});
  const secondaryDone=patients.filter(function(p){return p.secondary;});
  const pCorrect=primaryDone.filter(function(p){return p.primary===(findCase(STATE.cases,p.id)||{}).primary;}).length;
  const sCorrect=secondaryDone.filter(function(p){return p.secondary===(findCase(STATE.cases,p.id)||{}).secondary;}).length;
  const dead=patients.filter(function(p){return patientIsDead(p,elapsed)||String(p.closedReason||'').indexOf('DEAD')===0;});
  const wrongVehicle=patients.filter(function(p){return p.closedReason==='DEAD_WRONG_VEHICLE';}).length;
  const overCapPatients=patients.filter(function(p){return p.overCapacity;});
  const overCap=overCapPatients.length;
  const hospOverflowRows=STATE.hospitals.map(function(h){
    const overRed=Math.max(0,h.redUsed-h.redCap), overYellow=Math.max(0,h.yellowUsed-h.yellowCap), overGreen=Math.max(0,h.greenUsed-h.greenCap);
    const isOver=(overRed+overYellow+overGreen)>0;
    return '<tr><td>'+esc(h.name)+'</td><td>'+h.redUsed+'/'+h.redCap+'</td><td>'+h.yellowUsed+'/'+h.yellowCap+'</td><td>'+h.greenUsed+'/'+h.greenCap+'</td><td>'+(isOver?'<span class="badge bad">เกิน Capacity</span>':'<span class="badge ok">ไม่เกิน</span>')+'</td></tr>';
  }).join('');
  const used={}; patients.forEach(function(p){(p.tx||[]).filter(Boolean).forEach(function(x){used[x.item]=(used[x.item]||0)+1;});});
  const missing=[]; patients.forEach(function(p){const c=findCase(STATE.cases,p.id);if(!c)return;(c.reqTx||[]).forEach(function(item){if(!(p.tx||[]).some(function(x){return x&&x.item===item&&txSlotStatus(x,elapsed)==='SUCCESS';}))missing.push('#'+p.id+': '+item);});});
  const resourceRows=STATE.resources.map(function(r){return '<tr><td>'+esc(r.item)+'</td><td>'+(used[r.item]||0)+'</td><td>'+(r.addedTotal||0)+'</td><td>'+r.stock+'</td></tr>';}).join('');
  const timeline=patients.slice().sort(function(a,b){return (a.createdAt||0)-(b.createdAt||0);}).map(function(p){
    const events=(p.events||[]).map(function(e){return fmtMin(e.t)+' '+esc(e.type)+(e.by?' — '+esc(e.by):'');}).join('<br>');
    return '<tr><td>#'+esc(p.id)+'</td><td>'+fmtMin(p.createdAt)+'</td><td>'+fmtMin(p.primaryTime)+'</td><td>'+fmtMin(p.secondaryTime)+'</td><td>'+fmtMin(p.txStartTime)+'</td><td>'+fmtMin(p.transferTime)+'</td><td>'+events+'</td></tr>';
  }).join('');
  return '<div class="grid cols-4">'+statCard('Primary ถูก',primaryDone.length?round1(pCorrect*100/primaryDone.length)+'%':'—')+statCard('Secondary ถูก',secondaryDone.length?round1(sCorrect*100/secondaryDone.length)+'%':'—')+statCard('เสียชีวิต',dead.length)+statCard('รถผิดประเภท',wrongVehicle)+'</div>'
    +'<div class="grid cols-3 section-gap">'+statCard('Door→Primary เฉลี่ย',avgMetric(patients.map(function(p){return p.primaryTime!=null?p.primaryTime-p.createdAt:NaN;}))+' น.')+statCard('Primary→Secondary เฉลี่ย',avgMetric(patients.map(function(p){return p.secondaryTime!=null&&p.primaryTime!=null?p.secondaryTime-p.primaryTime:NaN;}))+' น.')+statCard('Secondary→Treatment เฉลี่ย',avgMetric(patients.map(function(p){return p.txStartTime!=null&&p.secondaryTime!=null?p.txStartTime-p.secondaryTime:NaN;}))+' น.')+'</div>'
    +'<div class="card section-gap"><h3>Death & system findings</h3><p>เสียชีวิตและสาเหตุ: '+(dead.map(function(p){return '#'+p.id+' '+deathReasonFor(p,elapsed);}).join(' | ')||'ไม่มี')+'</p><p>Treatment ที่ขาด: '+(missing.join(' | ')||'ไม่มี')+'</p><p>ส่งเกิน Hospital capacity: '+overCap+' คน'+(overCapPatients.length?' ('+overCapPatients.map(function(p){return '#'+p.id+'→'+esc(p.hospital||'');}).join(', ')+')':'')+'</p>'
    +'<table style="margin-top:8px;"><thead><tr><th>รพ.</th><th>RED used/cap</th><th>YELLOW used/cap</th><th>GREEN used/cap</th><th>สถานะ</th></tr></thead><tbody>'+hospOverflowRows+'</tbody></table></div>'
    +'<div class="card section-gap"><h3>ทรัพยากร</h3><table><thead><tr><th>รายการ</th><th>ใช้จริง</th><th>GM เพิ่ม</th><th>คงเหลือ</th></tr></thead><tbody>'+resourceRows+'</tbody></table></div>'
    +'<div class="card section-gap"><h3>Patient Timeline</h3><table><thead><tr><th>ID</th><th>Door</th><th>Primary</th><th>Secondary</th><th>Tx start</th><th>Transfer</th><th>เหตุการณ์</th></tr></thead><tbody>'+timeline+'</tbody></table></div>';
}

/* ============================================================
   24) EVENT WIRING (delegated) + BOOT
============================================================ */
function val(id){ const el = document.getElementById(id); return el ? el.value : ''; }

async function handleClick(el){
  const act = el.dataset.act;
  if(act==='join'){
    const name = val('joinName');
    const asGM = document.getElementById('joinAsGM').checked;
    const asCommander = document.getElementById('joinAsCommander').checked;
    await joinAsPlayer(name, asGM, asCommander);
    return;
  }
  if(act==='leaveJoin'){
    STATE.me.name=null; STATE.me.station=null;
    if(pollTimer){ clearInterval(pollTimer); pollTimer=null; }
    render(true);
    return;
  }
  if(act==='gmTab'){ STATE.gmTab = el.dataset.tab; render(true); return; }
  if(act==='gmStart'){ await gmStartGame(); return; }
  if(act==='gmEnd'){ await gmEndGame(); return; }
  if(act==='gmReset'){ if(confirm('ยืนยัน Reset เกม? ข้อมูลผู้ป่วยทั้งหมดจะถูกลบ')) await gmResetGame(); return; }
  if(act==='gmSaveConfig'){
    await gmUpdateConfig({
      maxGameMin: Number(val('cfgMaxMin'))||60
    });
    toast('บันทึกการตั้งค่าแล้ว','ok');
    return;
  }
  if(act==='gmRemove'){ await gmRemovePlayer(el.dataset.name); return; }
  if(act==='selfCommander'){ await gmAssignStation(STATE.me.name,'COMMANDER'); return; }
  if(act==='gmAddVehicle'){ await gmAddVehicle(val('newVehicleName'),val('newVehicleType')); return; }
  if(act==='gmRemoveVehicle'){ await gmRemoveVehicle(el.dataset.vehicle); return; }
  if(act==='gmDeleteCase'){ if(confirm('ลบเคส #'+el.dataset.id+' ?')) await gmDeleteCase(el.dataset.id); return; }
  if(act==='gmAddCaseBtn'){
    const id = val('ncId').trim();
    if(!id){ toast('กรอก Patient ID','err'); return; }
    const reqTx = [val('ncReq1'), val('ncReq2'), val('ncReq3')].filter(Boolean);
    await gmAddCase({
      id: id, canWalk: val('ncWalk'), reqTx: reqTx,
      timeLimit: Number(val('ncLimit'))||30,
      primary: val('ncPrimary'), secondary: val('ncSecondary'),
      dispo: val('ncDispo'), vehicle: val('ncVehicle')||null
    });
    return;
  }
  if(act==='gmSaveResource'){
    const item = el.dataset.item;
    await gmUpdateResource(item, {
      stock: Number(val('res_stock_'+item))||0,
      durationSec: Number(val('res_dur_'+item))||5
    });
    return;
  }
  if(act==='gmSaveHospital'){
    const i=Number(el.dataset.index), h=STATE.hospitals[i]; if(!h)return;
    await gmRenameHospital(h.name,val('hosp_name_'+i),{
      redCap:Number(val('hosp_red_'+i))||0,
      yellowCap:Number(val('hosp_yellow_'+i))||0,
      greenCap:Number(val('hosp_green_'+i))||0,
      distanceMin:Number(val('hosp_dist_'+i))||1
    });
    return;
  }
  if(act==='primaryRegister'){ await primaryRegister(val('primaryIdInput')); const inp=document.getElementById('primaryIdInput'); if(inp) inp.value=''; return; }
  if(act==='primarySet'){ await primarySetField(el.dataset.pid, el.dataset.field, el.dataset.value); return; }
  if(act==='primarySend'){ await primarySend(el.dataset.pid, el.dataset.dest); return; }
  if(act==='secondarySet'){ await secondarySetField(el.dataset.pid, el.dataset.field, el.dataset.value); return; }
  if(act==='secondarySend'){ await secondarySend(el.dataset.pid, el.dataset.dest); return; }
  if(act==='txDispo'){ await txSetDispo(el.dataset.pid, el.dataset.value); return; }
  if(act==='dispatchSend'){ await dispatchSend(el.dataset.vehicle); return; }
  if(act==='gmAssign'){ /* handled on change */ return; }
}

async function handleChange(el){
  const act = el.dataset.act;
  if(act==='gmAssign'){ await gmAssignStation(el.dataset.name, el.value); return; }
  if(act==='transferSet'){ await transferAssign(el.dataset.pid, el.dataset.field, el.value); return; }
  if(act==='txNote'){ await txSetNote(el.dataset.pid,el.value); return; }
  if(act==='txSelect'){
    if(!el.value) return;
    await txStartItem(el.dataset.pid, Number(el.dataset.slot), el.value);
    return;
  }
}

function boot(){
  fbInit();
  const app = document.getElementById('app');
  app.addEventListener('click', function(e){
    const el = e.target.closest('[data-act]');
    if(!el || el.disabled) return;
    handleClick(el);
  });
  app.addEventListener('change', function(e){
    const el = e.target.closest('[data-act]');
    if(!el) return;
    handleChange(el);
  });
  app.addEventListener('keydown', function(e){
    if(e.key!=='Enter') return;
    const el = e.target.closest('[data-enter-act]');
    if(!el) return;
    e.preventDefault();
    const act = el.dataset.enterAct;
    if(act==='join') handleClick({dataset:{act:'join'}});
    else if(act==='primaryRegister') handleClick({dataset:{act:'primaryRegister'}});
  });
  render(true);
  if(fbReady) fbSelfTest();
}

boot();
})();
